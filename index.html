<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SXG Mitarbeiterportal</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#f4f5f7;--dark:#0b0b0f;--card:#fff;--muted:#6b7280;--line:#e5e7eb;--green:#16a34a;--red:#dc2626;--amber:#d97706}
    *{box-sizing:border-box}body{margin:0;font-family:Arial,system-ui;background:var(--bg);color:#111}button{border:0;border-radius:12px;background:#111;color:white;padding:11px 15px;font-weight:700;cursor:pointer}button.secondary{background:#e5e7eb;color:#111}button.danger{background:#fee2e2;color:#991b1b}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px;background:#fff}textarea{min-height:80px}.hidden{display:none!important}
    .auth{min-height:100vh;background:#111;display:grid;place-items:center;padding:20px}.auth-card{background:white;border-radius:24px;padding:26px;max-width:460px;width:100%;box-shadow:0 20px 80px #0003}.auth-card h1{margin:0 0 5px}.auth-card form{display:grid;gap:12px;margin-top:18px}.link{background:transparent;color:#111;text-decoration:underline;padding:5px}.app{display:grid;grid-template-columns:270px 1fr;min-height:100vh}.side{background:#111;color:white;padding:22px;display:flex;flex-direction:column;gap:18px}.logo{font-size:30px;font-weight:900;letter-spacing:-1px}.logo small{display:block;font-size:11px;letter-spacing:2px;font-weight:400}.nav{display:grid;gap:8px}.nav button{background:transparent;color:#ddd;text-align:left}.nav button.active,.nav button:hover{background:white;color:#111}.userbox{margin-top:auto;border:1px solid #ffffff22;border-radius:18px;padding:14px}.main{padding:25px;max-width:1400px;width:100%;margin:auto}.top{display:flex;justify-content:space-between;gap:15px;align-items:center;margin-bottom:18px}.top h1{margin:0;font-size:32px}.top p{margin:4px 0 0;color:var(--muted)}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px}.card,.panel{background:white;border-radius:22px;padding:20px;box-shadow:0 10px 40px #00000012;border:1px solid #ffffff}.card h3{margin-top:0}.panel{margin-bottom:18px}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}.table{display:grid;gap:10px}.row{display:grid;grid-template-columns:1.3fr 1fr 1fr auto;gap:10px;align-items:center;border:1px solid var(--line);border-radius:16px;padding:13px;background:#fff}.badge{display:inline-block;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:800;background:#eee}.ok{background:#dcfce7;color:#166534}.warn{background:#fef3c7;color:#92400e}.bad{background:#fee2e2;color:#991b1b}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.form{display:grid;grid-template-columns:1fr 1fr;gap:12px}.full{grid-column:1/-1}.modal{position:fixed;inset:0;background:#0008;display:grid;place-items:center;padding:20px;z-index:20}.modalbox{background:white;border-radius:24px;padding:22px;max-width:760px;width:100%;max-height:90vh;overflow:auto}.modalhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}.modalhead h2{margin:0}.empty{text-align:center;color:var(--muted);padding:60px}.mobile{display:none}@media(max-width:850px){.app{grid-template-columns:1fr}.side{position:fixed;left:-290px;top:0;bottom:0;width:270px;z-index:30;transition:.2s}.side.open{left:0}.mobile{display:inline-block}.row,.form,.grid2{grid-template-columns:1fr}.main{padding:15px}.top h1{font-size:24px}}
  </style>
</head>
<body>
<div id="root"></div>

<script>
const SUPABASE_URL = "https://pgwsjxokhsvlziouwjsd.supabase.co";
const SUPABASE_KEY = "sb_publishable_FKpcv4cvX3e4eQg6JdLMUw_zA9kfQPx";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let state = {
  session:null, profile:null, page:"dashboard", openSide:false,
  jobs:[], profiles:[], assignments:[], timesheets:[], leaves:[], attendance:[], modal:null
};

const root = document.getElementById("root");
const esc = v => String(v ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
const admin = () => state.profile?.role === "admin" && (state.profile?.approved === true || state.profile?.approved === "TRUE");
const nameOf = id => state.profiles.find(p=>p.id===id)?.full_name || state.profiles.find(p=>p.id===id)?.email || "Mitarbeiter";
const jobOf = id => state.jobs.find(j=>String(j.id)===String(id))?.title || "Kein Auftrag";
const msg = t => alert(t);

async function init(){
  const {data} = await sb.auth.getSession();
  state.session = data.session;
  if(state.session) await loadProfile();
  render();
}
async function loadProfile(){
  const u = state.session.user;
  let {data} = await sb.from("profiles").select("*").eq("id", u.id).maybeSingle();
  if(!data){
    data = {id:u.id,email:u.email,full_name:u.user_metadata?.full_name || u.email,role:"employee",approved:false};
    await sb.from("profiles").insert(data);
  }
  state.profile = data;
  await loadAll();
}
async function loadAll(){
  const safe = async p => { try { const r = await p; return r.data || [] } catch(e){ return [] } };
  const [jobs,profiles,assignments,timesheets,leaves,attendance] = await Promise.all([
    safe(sb.from("jobs").select("*").order("id",{ascending:false})),
    safe(sb.from("profiles").select("*").order("full_name")),
    safe(sb.from("job_assignments").select("*").order("id",{ascending:false})),
    safe(sb.from("timesheets").select("*").order("id",{ascending:false})),
    safe(sb.from("leave_requests").select("*").order("id",{ascending:false})),
    safe(sb.from("attendance").select("*").order("id",{ascending:false}))
  ]);
  Object.assign(state,{jobs,profiles,assignments,timesheets,leaves,attendance});
}
async function login(e){
  e.preventDefault();
  const f=new FormData(e.target);
  const {error}=await sb.auth.signInWithPassword({email:f.get("email"),password:f.get("password")});
  if(error) return msg(error.message);
  location.reload();
}
async function register(e){
  e.preventDefault();
  const f=new FormData(e.target);
  const {error}=await sb.auth.signUp({email:f.get("email"),password:f.get("password"),options:{data:{full_name:f.get("name"),phone:f.get("phone")}}});
  if(error) return msg(error.message);
  msg("Registrierung erstellt. Admin muss dich freigeben.");
}
async function logout(){ await sb.auth.signOut(); location.reload(); }
function setPage(p){ state.page=p; state.openSide=false; render(); }
function openModal(type,id=null){ state.modal={type,id}; render(); }
function closeModal(){ state.modal=null; render(); }

async function saveJob(e){
  e.preventDefault();
  const f=new FormData(e.target), id=f.get("id");
  const row={title:f.get("title"),client:f.get("client"),location:f.get("location"),job_date:f.get("job_date"),start_date:f.get("job_date"),end_date:f.get("job_date"),start_time:f.get("start_time"),end_time:f.get("end_time"),needed_employees:Number(f.get("needed_employees")||1),notes:f.get("notes"),status:f.get("status")||"open",updated_at:new Date().toISOString()};
  const r = id ? await sb.from("jobs").update(row).eq("id",id) : await sb.from("jobs").insert(row);
  if(r.error) return msg(r.error.message);
  closeModal(); await loadAll(); render();
}
async function delJob(id){ if(confirm("Auftrag wirklich löschen?")){const r=await sb.from("jobs").delete().eq("id",id); if(r.error)return msg(r.error.message); await loadAll(); render();}}
async function assignJob(id){ const r=await sb.from("job_assignments").insert({job_id:id,employee_id:state.profile.id,profile_id:state.profile.id}); if(r.error)return msg(r.error.message); await loadAll(); render(); }

async function saveTime(e){
  e.preventDefault();
  const f=new FormData(e.target), id=f.get("id"), pid=f.get("profile_id")||state.profile.id;
  const row={profile_id:pid,employee_id:pid,job_id:f.get("job_id")||null,work_date:f.get("work_date"),start_time:f.get("start_time"),end_time:f.get("end_time"),break_minutes:Number(f.get("break_minutes")||0),location:f.get("location"),activity:f.get("activity"),description:f.get("description"),hours_worked:Number(f.get("hours_worked")||0),hours:Number(f.get("hours_worked")||0),approved:f.get("approved")==="on",status:f.get("approved")==="on"?"approved":"pending"};
  const r = id ? await sb.from("timesheets").update(row).eq("id",id) : await sb.from("timesheets").insert(row);
  if(r.error) return msg(r.error.message);
  closeModal(); await loadAll(); render();
}
async function delTime(id){ if(confirm("Stundeneintrag löschen?")){const r=await sb.from("timesheets").delete().eq("id",id); if(r.error)return msg(r.error.message); await loadAll(); render();}}

async function saveLeave(e){
  e.preventDefault();
  const f=new FormData(e.target), id=f.get("id"), pid=f.get("profile_id")||state.profile.id;
  const row={profile_id:pid,employee_id:pid,type:f.get("leave_type"),leave_type:f.get("leave_type"),start_date:f.get("start_date"),end_date:f.get("end_date"),reason:f.get("reason"),status:id?f.get("status"):"pending"};
  const r = id ? await sb.from("leave_requests").update(row).eq("id",id) : await sb.from("leave_requests").insert(row);
  if(r.error) return msg(r.error.message);
  closeModal(); await loadAll(); render();
}
async function reviewLeave(id,status){ const r=await sb.from("leave_requests").update({status,approved:status==="approved",reviewed_at:new Date().toISOString(),reviewed_by:state.profile.id}).eq("id",id); if(r.error)return msg(r.error.message); await loadAll(); render(); }

async function saveProfile(e){
  e.preventDefault();
  const f=new FormData(e.target);
  const row={full_name:f.get("full_name"),phone:f.get("phone"),role:f.get("role"),approved:f.get("approved")==="on",guard_id:f.get("guard_id"),tax_id:f.get("tax_id"),address:f.get("address"),emergency_contact:f.get("emergency_contact"),qualification:f.get("qualification"),iban:f.get("iban")};
  const r=await sb.from("profiles").update(row).eq("id",f.get("id"));
  if(r.error)return msg(r.error.message);
  closeModal(); await loadProfile(); render();
}
async function clockIn(){
  const r=await sb.from("attendance").insert({profile_id:state.profile.id,check_in:new Date().toISOString(),clock_in:new Date().toISOString(),present:true});
  if(r.error)return msg(r.error.message); await loadAll(); render();
}
async function clockOut(){
  const open=state.attendance.find(a=>a.profile_id===state.profile.id && !a.check_out);
  if(!open) return msg("Kein offener Eintrag gefunden.");
  const r=await sb.from("attendance").update({check_out:new Date().toISOString(),clock_out:new Date().toISOString()}).eq("id",open.id);
  if(r.error)return msg(r.error.message); await loadAll(); render();
}

function render(){
  if(!state.session){ root.innerHTML = authHtml(); bind(); return; }
  if(state.profile && !state.profile.approved){
    root.innerHTML=`<div class="auth"><div class="auth-card"><h1>SXG Portal</h1><p>Dein Konto wartet auf Admin-Freigabe.</p><button onclick="location.reload()">Status neu laden</button><br><br><button class="secondary" onclick="logout()">Abmelden</button></div></div>`;
    return;
  }
  root.innerHTML = appHtml();
  bind();
}
function authHtml(){
  return `<div class="auth"><div class="auth-card">
    <h1>SXG Sicherheit & Service</h1><p>Mitarbeiterportal</p>
    <form id="loginForm"><input name="email" placeholder="E-Mail" required><input name="password" type="password" placeholder="Passwort" required><button>Anmelden</button></form>
    <hr><h3>Registrieren</h3>
    <form id="regForm"><input name="name" placeholder="Name" required><input name="phone" placeholder="Telefon"><input name="email" placeholder="E-Mail" required><input name="password" type="password" placeholder="Passwort" required><button>Registrieren</button></form>
  </div></div>`;
}
function appHtml(){
  const pages = [["dashboard","Dashboard"],["jobs","Aufträge"],["assignments","Einsätze"],["attendance","Anwesenheit"],["timesheets","Stunden"],["leave","Urlaub/Krank"],["employees","Mitarbeiter"],["profile","Profil"]].filter(x=>admin()||x[0]!=="employees");
  return `<div class="app">
    <aside class="side ${state.openSide?'open':''}"><div class="logo">SXG<small>Sicherheit & Service GmbH</small></div><div class="nav">${pages.map(p=>`<button class="${state.page===p[0]?'active':''}" onclick="setPage('${p[0]}')">${p[1]}</button>`).join("")}</div><div class="userbox"><b>${esc(state.profile.full_name)}</b><br><small>${admin()?'Admin':'Mitarbeiter'}</small></div></aside>
    <main class="main"><div class="top"><button class="mobile secondary" onclick="state.openSide=!state.openSide;render()">☰</button><div><h1>${pages.find(p=>p[0]===state.page)?.[1]||"Portal"}</h1><p>SXG Mitarbeiterportal</p></div><button class="secondary" onclick="logout()">Abmelden</button></div>${contentHtml()}</main>${modalHtml()}</div>`;
}
function contentHtml(){
  if(state.page==="dashboard") return `<div class="cards"><div class="card"><h3>Aufträge</h3><h1>${state.jobs.length}</h1></div><div class="card"><h3>Mitarbeiter</h3><h1>${state.profiles.length}</h1></div><div class="card"><h3>Stunden</h3><h1>${state.timesheets.length}</h1></div><div class="card"><h3>Urlaub</h3><h1>${state.leaves.length}</h1></div></div>`;
  if(state.page==="jobs") return `<section class="panel"><div class="toolbar"><h2>Aufträge</h2>${admin()?`<button onclick="openModal('job')">+ Auftrag erstellen</button>`:""}</div><div class="table">${state.jobs.map(j=>`<div class="row"><div><b>${esc(j.title)}</b><br>${esc(j.client)} · ${esc(j.location)}<br>${esc(j.job_date||j.start_date)} ${esc(j.start_time)}–${esc(j.end_time)}<br><small>${esc(j.notes)}</small></div><span>${esc(j.needed_employees)} Mitarbeiter</span><span class="badge ${j.status==='closed'?'warn':'ok'}">${esc(j.status||'open')}</span><div>${admin()?`<button class="secondary" onclick="openModal('job',${j.id})">Bearbeiten</button> <button class="danger" onclick="delJob(${j.id})">Löschen</button>`:`<button onclick="assignJob(${j.id})">Eintragen</button>`}</div></div>`).join("") || `<div class="empty">Keine Aufträge vorhanden</div>`}</div></section>`;
  if(state.page==="assignments") return `<section class="panel"><h2>Einsätze</h2><div class="table">${state.assignments.map(a=>`<div class="row"><b>${esc(jobOf(a.job_id))}</b><span>${esc(nameOf(a.profile_id||a.employee_id))}</span><span>${esc(a.created_at||a.assigned_at||"")}</span><span class="badge">aktiv</span></div>`).join("") || `<div class="empty">Keine Einsätze vorhanden</div>`}</div></section>`;
  if(state.page==="attendance"){ const open=state.attendance.find(a=>a.profile_id===state.profile.id&&!a.check_out); return `<section class="panel"><h2>Anwesenheit</h2><div class="card"><p>${open?"Du bist eingestempelt.":"Du bist nicht eingestempelt."}</p>${open?`<button onclick="clockOut()">Ausstempeln</button>`:`<button onclick="clockIn()">Einstempeln</button>`}</div><br><div class="table">${state.attendance.map(a=>`<div class="row"><b>${esc(nameOf(a.profile_id))}</b><span>${a.check_in?new Date(a.check_in).toLocaleString():"-"}</span><span>${a.check_out?new Date(a.check_out).toLocaleString():"offen"}</span><span class="badge">${a.present?"anwesend":"-"}</span></div>`).join("")}</div></section>`;}
  if(state.page==="timesheets"){ const rows=admin()?state.timesheets:state.timesheets.filter(t=>(t.profile_id||t.employee_id)===state.profile.id); return `<section class="panel"><div class="toolbar"><h2>Stundenzettel</h2><button onclick="openModal('time')">+ Stunden ${admin()?"nachtragen":"eintragen"}</button></div><div class="table">${rows.map(t=>`<div class="row"><div><b>${esc(nameOf(t.profile_id||t.employee_id))}</b><br>${esc(t.work_date)} · ${esc(t.start_time)}–${esc(t.end_time)} · ${esc(t.location)}<br>${esc(t.activity)} · ${esc(t.description)}</div><span>${esc(t.hours_worked||t.hours||"")} Std.</span><span class="badge ${t.approved?'ok':'warn'}">${esc(t.status||"pending")}</span><div><button class="secondary" onclick="openModal('time',${t.id})">Bearbeiten</button>${admin()?` <button class="danger" onclick="delTime(${t.id})">Löschen</button>`:""}</div></div>`).join("") || `<div class="empty">Keine Stunden vorhanden</div>`}</div></section>`;}
  if(state.page==="leave"){ const rows=admin()?state.leaves:state.leaves.filter(l=>(l.profile_id||l.employee_id)===state.profile.id); return `<section class="panel"><div class="toolbar"><h2>Urlaub / Krankmeldung</h2><button onclick="openModal('leave')">+ Antrag</button></div><div class="table">${rows.map(l=>`<div class="row"><div><b>${esc(nameOf(l.profile_id||l.employee_id))}</b><br>${esc(l.leave_type||l.type)} · ${esc(l.start_date)} bis ${esc(l.end_date)}<br>${esc(l.reason)}</div><span></span><span class="badge ${l.status==='approved'?'ok':l.status==='rejected'?'bad':'warn'}">${esc(l.status||"pending")}</span><div>${admin()?`<button onclick="reviewLeave(${l.id},'approved')">Genehmigen</button> <button class="danger" onclick="reviewLeave(${l.id},'rejected')">Ablehnen</button>`:""}</div></div>`).join("") || `<div class="empty">Keine Anträge</div>`}</div></section>`;}
  if(state.page==="employees") return `<section class="panel"><h2>Mitarbeiter</h2><div class="cards">${state.profiles.map(p=>`<div class="card"><h3>${esc(p.full_name)}</h3><p>${esc(p.email)}</p><p><span class="badge ${p.approved?'ok':'warn'}">${esc(p.role)} · ${p.approved?'aktiv':'wartet'}</span></p><p>Bewacher-ID: ${esc(p.guard_id||"—")}<br>Steuer-ID: ${esc(p.tax_id||"—")}</p><button onclick="openModal('profile','${p.id}')">Bearbeiten</button></div>`).join("")}</div></section>`;
  if(state.page==="profile") return `<section class="panel"><h2>Mein Profil</h2><p><b>${esc(state.profile.full_name)}</b></p><p>${esc(state.profile.email)}</p><p>Bewacher-ID: ${esc(state.profile.guard_id||"—")}</p><p>Steuer-ID: ${esc(state.profile.tax_id||"—")}</p><button onclick="openModal('profile','${state.profile.id}')">Profil bearbeiten</button></section>`;
}
function modalHtml(){
  if(!state.modal) return "";
  const {type,id}=state.modal;
  if(type==="job"){ const j=state.jobs.find(x=>String(x.id)===String(id))||{}; return modal("Auftrag",`<form class="form" id="jobForm"><input type="hidden" name="id" value="${esc(j.id||"")}"><input name="title" placeholder="Titel" value="${esc(j.title||"")}"><input name="client" placeholder="Kunde" value="${esc(j.client||"")}"><input name="location" placeholder="Standort" value="${esc(j.location||"")}"><input type="date" name="job_date" value="${esc(j.job_date||j.start_date||"")}"><input name="start_time" placeholder="Start" value="${esc(j.start_time||"")}"><input name="end_time" placeholder="Ende" value="${esc(j.end_time||"")}"><input type="number" name="needed_employees" placeholder="Mitarbeiter" value="${esc(j.needed_employees||1)}"><input name="status" value="${esc(j.status||"open")}"><textarea class="full" name="notes" placeholder="Hinweise">${esc(j.notes||"")}</textarea><button>Speichern</button></form>`);}
  if(type==="time"){ const t=state.timesheets.find(x=>String(x.id)===String(id))||{}; return modal("Stunden",`<form class="form" id="timeForm"><input type="hidden" name="id" value="${esc(t.id||"")}"><select name="profile_id">${state.profiles.map(p=>`<option value="${p.id}" ${(t.profile_id||state.profile.id)===p.id?"selected":""}>${esc(p.full_name||p.email)}</option>`).join("")}</select><select name="job_id"><option value="">Kein Auftrag</option>${state.jobs.map(j=>`<option value="${j.id}" ${String(t.job_id)===String(j.id)?"selected":""}>${esc(j.title)}</option>`).join("")}</select><input type="date" name="work_date" value="${esc(t.work_date||"")}"><input name="start_time" placeholder="Start" value="${esc(t.start_time||"")}"><input name="end_time" placeholder="Ende" value="${esc(t.end_time||"")}"><input type="number" name="break_minutes" placeholder="Pause Minuten" value="${esc(t.break_minutes||0)}"><input type="number" step="0.25" name="hours_worked" placeholder="Stunden" value="${esc(t.hours_worked||t.hours||"")}"><input name="location" placeholder="Standort" value="${esc(t.location||"")}"><input name="activity" placeholder="Tätigkeit" value="${esc(t.activity||"")}"><textarea class="full" name="description" placeholder="Beschreibung">${esc(t.description||"")}</textarea><label class="full"><input type="checkbox" name="approved" ${t.approved?"checked":""}> freigegeben</label><button>Speichern</button></form>`);}
  if(type==="leave"){ const l=state.leaves.find(x=>String(x.id)===String(id))||{}; return modal("Urlaub / Krankmeldung",`<form class="form" id="leaveForm"><input type="hidden" name="id" value="${esc(l.id||"")}">${admin()?`<select name="profile_id">${state.profiles.map(p=>`<option value="${p.id}" ${(l.profile_id||state.profile.id)===p.id?"selected":""}>${esc(p.full_name||p.email)}</option>`).join("")}</select>`:""}<select name="leave_type"><option>Urlaub</option><option>Krankmeldung</option><option>Sonstiges</option></select><input type="date" name="start_date" value="${esc(l.start_date||"")}"><input type="date" name="end_date" value="${esc(l.end_date||"")}"><input class="full" name="reason" placeholder="Grund" value="${esc(l.reason||"")}"><input type="hidden" name="status" value="${esc(l.status||"pending")}"><button>Speichern</button></form>`);}
  if(type==="profile"){ const p=state.profiles.find(x=>x.id===id)||state.profile; return modal("Profil",`<form class="form" id="profileForm"><input type="hidden" name="id" value="${esc(p.id)}"><input name="full_name" placeholder="Name" value="${esc(p.full_name||"")}"><input name="phone" placeholder="Telefon" value="${esc(p.phone||"")}"><input name="role" placeholder="Rolle" value="${esc(p.role||"employee")}"><input name="guard_id" placeholder="Bewacher-ID" value="${esc(p.guard_id||"")}"><input name="tax_id" placeholder="Steuer-ID" value="${esc(p.tax_id||"")}"><input name="address" placeholder="Adresse" value="${esc(p.address||"")}"><input name="emergency_contact" placeholder="Notfallkontakt" value="${esc(p.emergency_contact||"")}"><input name="qualification" placeholder="Qualifikation" value="${esc(p.qualification||"")}"><input name="iban" placeholder="IBAN" value="${esc(p.iban||"")}"><label class="full"><input type="checkbox" name="approved" ${p.approved?"checked":""}> freigegeben</label><button>Speichern</button></form>`);}
}
function modal(title,body){return `<div class="modal"><div class="modalbox"><div class="modalhead"><h2>${title}</h2><button class="secondary" onclick="closeModal()">X</button></div>${body}</div></div>`;}
function bind(){
  document.getElementById("loginForm")?.addEventListener("submit",login);
  document.getElementById("regForm")?.addEventListener("submit",register);
  document.getElementById("jobForm")?.addEventListener("submit",saveJob);
  document.getElementById("timeForm")?.addEventListener("submit",saveTime);
  document.getElementById("leaveForm")?.addEventListener("submit",saveLeave);
  document.getElementById("profileForm")?.addEventListener("submit",saveProfile);
}
window.setPage=setPage; window.openModal=openModal; window.closeModal=closeModal; window.logout=logout; window.delJob=delJob; window.assignJob=assignJob; window.delTime=delTime; window.reviewLeave=reviewLeave; window.clockIn=clockIn; window.clockOut=clockOut; window.state=state; window.render=render;
init();
</script>
