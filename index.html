  if(!start||!end||!pStart||!pEnd)return 0

async function checkOut(){

  const out=new Date().toISOString();
  const r=await sb.from("attendance").update({check_out:out,clock_out:out}).eq("id",open.id);
  if(r.error)return msg(r.error.message);
  await createTimesheetFromAttendance(open,out);

}
async function createTimesheetFromAttendance(att,outIso){
  const inIso=att.check_in||att.clock_in;
  if(!inIso||!outIso)return;
  const old=findAttendanceTimesheet?findAttendanceTimesheet(att):state.timesheets.find(t=>String(t.attendance_id||"")===String(att.id));
  const j=jobOf(att.job_id)||{};
  const breakMin=Number(j.default_break_minutes||0);
  const minutes=minsBetween(inIso,outIso);
  const hours=Math.max(0,Math.round(((minutes-breakMin)/60)*10000)/10000);
  const row={
    profile_id:att.profile_id||myId(),
    employee_id:att.profile_id||myId(),
    job_id:att.job_id||null,
    work_date:isoDate(inIso),
    start_time:isoTime(inIso),
    end_time:isoTime(outIso),
    break_minutes:breakMin,
    location:j.location||j.address||"",
    activity:j.title||"Einsatz",
    description:"Automatisch aus Check-in/Check-out erstellt",
    hours_worked:hours,
    hours:hours,
    approved:false,
    status:"pending",
    attendance_id:att.id
  };
  if(old){await sb.from("timesheets").update(row).eq("id",old.id)}
  else{await sb.from("timesheets").insert(row)}
}
function startTracking(jobId){stopTracking();if(!navigator.geolocation)return;state.watchId=navigator.geolocation.watchPosition(async p=>{await sb.from("location_logs").insert({profile_id:myId(),job_id:jobId,lat:p.coords.latitude,lng:p.coords.longitude,accuracy:p.coords.accuracy})},()=>{},{enableHighAccuracy:true,maximumAge:10000,timeout:15000})}

function assignmentStatus(a){
  const j=jobOf(a.job_id)||{}
  const att=state.attendance.find(x=>String(x.job_id)===String(a.job_id)&&(x.profile_id===(a.profile_id||a.employee_id)))
  if(att&&att.check_in&&!att.check_out)return "läuft"
  if(att&&att.check_out)return "abgeschlossen"
  if(isJobExpired(j))return "abgelaufen"
  return "aktuell"
}
