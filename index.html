<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SXG Mitarbeiterportal</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#f4f5f7;--dark:#0b0b0f;--card:#fff;--muted:#6b7280;--line:#e5e7eb;--green:#16a34a;--red:#dc2626;--amber:#d97706;--blue:#2563eb}
    *{box-sizing:border-box}body{margin:0;font-family:Arial,system-ui;background:var(--bg);color:#111}button{border:0;border-radius:12px;background:#111;color:white;padding:11px 15px;font-weight:700;cursor:pointer}button.secondary{background:#e5e7eb;color:#111}button.danger{background:#fee2e2;color:#991b1b}button.ok{background:#dcfce7;color:#166534}button.warn{background:#fef3c7;color:#92400e}button:disabled{opacity:.45;cursor:not-allowed}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px;background:#fff}textarea{min-height:80px}.hidden{display:none!important}
    .auth{min-height:100vh;background:#111;display:grid;place-items:center;padding:20px}.auth-card{background:white;border-radius:24px;padding:26px;max-width:460px;width:100%;box-shadow:0 20px 80px #0003}.auth-card h1{margin:0 0 5px}.auth-card form{display:grid;gap:12px;margin-top:18px}
    .app{display:grid;grid-template-columns:270px 1fr;min-height:100vh}.side{background:#111;color:white;padding:22px;display:flex;flex-direction:column;gap:18px}.logo{font-size:30px;font-weight:900;letter-spacing:-1px}.logo small{display:block;font-size:11px;letter-spacing:2px;font-weight:400}.nav{display:grid;gap:8px}.nav button{background:transparent;color:#ddd;text-align:left}.nav button.active,.nav button:hover{background:white;color:#111}.userbox{margin-top:auto;border:1px solid #ffffff22;border-radius:18px;padding:14px}.main{padding:25px;max-width:1500px;width:100%;margin:auto}.top{display:flex;justify-content:space-between;gap:15px;align-items:center;margin-bottom:18px}.top h1{margin:0;font-size:32px}.top p{margin:4px 0 0;color:var(--muted)}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px}.card,.panel{background:white;border-radius:22px;padding:20px;box-shadow:0 10px 40px #00000012;border:1px solid #ffffff}.card h3{margin-top:0}.panel{margin-bottom:18px}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}.table{display:grid;gap:10px}.row{display:grid;grid-template-columns:1.3fr 1fr 1fr auto;gap:10px;align-items:center;border:1px solid var(--line);border-radius:16px;padding:13px;background:#fff}.badge{display:inline-block;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:800;background:#eee}.badge.ok{background:#dcfce7;color:#166534}.badge.warn{background:#fef3c7;color:#92400e}.badge.bad{background:#fee2e2;color:#991b1b}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.form{display:grid;grid-template-columns:1fr 1fr;gap:12px}.full{grid-column:1/-1}.modal{position:fixed;inset:0;background:#0008;display:grid;place-items:center;padding:20px;z-index:20}.modalbox{background:white;border-radius:24px;padding:22px;max-width:820px;width:100%;max-height:90vh;overflow:auto}.modalhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}.modalhead h2{margin:0}.empty{text-align:center;color:var(--muted);padding:60px}.mobile{display:none}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.day{min-height:105px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:8px}.day b{font-size:13px}.mini{display:block;background:#111;color:#fff;border-radius:9px;padding:5px;margin-top:5px;font-size:11px}.notice{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:16px;padding:14px;margin-bottom:14px}.pillbox{display:flex;gap:8px;flex-wrap:wrap}.pill{background:#f1f5f9;border-radius:999px;padding:8px 12px;font-weight:700}@media(max-width:850px){.app{grid-template-columns:1fr}.side{position:fixed;left:-290px;top:0;bottom:0;width:270px;z-index:30;transition:.2s}.side.open{left:0}.mobile{display:inline-block}.row,.form,.grid2{grid-template-columns:1fr}.main{padding:15px}.top h1{font-size:24px}.calendar{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div id="root"></div>

<script>
const SUPABASE_URL = "https://pgwsjxokhsvlziouwjsd.supabase.co";
const SUPABASE_KEY = "sb_publishable_FKpcv4cvX3e4eQg6JdLMUw_zA9kfQPx";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let state = {session:null, profile:null, page:"dashboard", openSide:false, jobs:[], profiles:[], assignments:[], timesheets:[], leaves:[], attendance:[], payslips:[], docs:[], modal:null};
const root = document.getElementById("root");
const esc = v => String(v ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
const admin = () => state.profile?.role === "admin" && (state.profile?.approved === true || state.profile?.approved === "TRUE");
const myId = () => state.profile?.id;
const nameOf = id => state.profiles.find(p=>p.id===id)?.full_name || state.profiles.find(p=>p.id===id)?.email || "Mitarbeiter";
const jobOf = id => state.jobs.find(j=>String(j.id)===String(id)) || null;
const msg = t => alert(t);
const todayISO = () => new Date().toISOString().slice(0,10);
const jobDate = j => j?.job_date || j?.start_date || "";
function notify(title, body){ if(!("Notification" in window)) return; if(Notification.permission === "granted") new Notification(title,{body}); }
async function askPush(){ if(!("Notification" in window)) return msg("Dieser Browser unterstützt keine Benachrichtigungen."); const p=await Notification.requestPermission(); msg(p==="granted"?"Benachrichtigungen aktiviert.":"Benachrichtigungen nicht erlaubt."); }
async function init(){ const {data}=await sb.auth.getSession(); state.session=data.session; if(state.session) await loadProfile(); render(); }
async function loadProfile(){ const u=state.session.user; let {data}=await sb.from("profiles").select("*").eq("id",u.id).maybeSingle(); if(!data){ data={id:u.id,email:u.email,full_name:u.user_metadata?.full_name||u.email,role:"employee",approved:false}; await sb.from("profiles").insert(data);} state.profile=data; await loadAll(); }
async function loadAll(){ const safe=async p=>{try{const r=await p;return r.data||[]}catch(e){return[]}}; const [jobs,profiles,assignments,timesheets,leaves,attendance,payslips,docs]=await Promise.all([safe(sb.from("jobs").select("*").order("id",{ascending:false})),safe(sb.from("profiles").select("*").order("full_name")),safe(sb.from("job_assignments").select("*").order("id",{ascending:false})),safe(sb.from("timesheets").select("*").order("id",{ascending:false})),safe(sb.from("leave_requests").select("*").order("id",{ascending:false})),safe(sb.from("attendance").select("*").order("id",{ascending:false})),safe(sb.from("payroll_documents").select("*").order("id",{ascending:false})),safe(sb.from("company_documents").select("*").order("id",{ascending:false}))]); Object.assign(state,{jobs,profiles,assignments,timesheets,leaves,attendance,payslips,docs}); checkNewJobsNotification(); }
function checkNewJobsNotification(){ if(!state.session || admin()) return; const last=Number(localStorage.getItem("sxg_last_job_id")||0); const newest=Math.max(0,...state.jobs.map(j=>Number(j.id)||0)); if(newest>last && last!==0) notify("Neuer SXG Einsatz","Es wurde ein neuer Einsatz veröffentlicht."); if(newest) localStorage.setItem("sxg_last_job_id",String(newest)); }
async function login(e){ e.preventDefault(); const f=new FormData(e.target); const {error}=await sb.auth.signInWithPassword({email:f.get("email"),password:f.get("password")}); if(error)return msg(error.message); location.reload(); }
async function register(e){ e.preventDefault(); const f=new FormData(e.target); const {error}=await sb.auth.signUp({email:f.get("email"),password:f.get("password"),options:{data:{full_name:f.get("name"),phone:f.get("phone")}}}); if(error)return msg(error.message); msg("Registrierung erstellt. Admin muss dich freigeben."); }
async function logout(){ await sb.auth.signOut(); location.reload(); }
function setPage(p){ state.page=p; state.openSide=false; render(); } function openModal(type,id=null){ state.modal={type,id}; render(); } function closeModal(){ state.modal=null; render(); }
function assignedCount(jobId){ return state.assignments.filter(a=>String(a.job_id)===String(jobId)).length; } function assignedNames(jobId){ return state.assignments.filter(a=>String(a.job_id)===String(jobId)).map(a=>nameOf(a.profile_id||a.employee_id)); } function isAssigned(jobId){ return state.assignments.some(a=>String(a.job_id)===String(jobId)&&(a.profile_id===myId()||a.employee_id===myId())); }
async function saveJob(e){ e.preventDefault(); const f=new FormData(e.target),id=f.get("id"); const row={title:f.get("title"),client:f.get("client"),location:f.get("location"),job_date:f.get("job_date"),start_date:f.get("job_date"),end_date:f.get("job_date"),start_time:f.get("start_time"),end_time:f.get("end_time"),needed_employees:Number(f.get("needed_employees")||1),notes:f.get("notes"),status:f.get("status")||"open",updated_at:new Date().toISOString()}; const r=id?await sb.from("jobs").update(row).eq("id",id):await sb.from("jobs").insert(row); if(r.error)return msg(r.error.message); if(!id)notify("Neuer Einsatz erstellt",row.title); closeModal(); await loadAll(); render(); }
async function delJob(id){ if(confirm("Auftrag wirklich löschen?")){const r=await sb.from("jobs").delete().eq("id",id); if(r.error)return msg(r.error.message); await loadAll(); render();} }
async function assignJob(id){ const j=jobOf(id); if(!j)return; if(assignedCount(id)>=Number(j.needed_employees||1))return msg("Dieser Einsatz ist bereits voll."); if(isAssigned(id))return msg("Du bist schon eingetragen."); const r=await sb.from("job_assignments").insert({job_id:id,employee_id:myId(),profile_id:myId()}); if(r.error)return msg(r.error.message); msg("Du bist für den Einsatz eingetragen."); await loadAll(); render(); }
async function unassignJob(id){ const row=state.assignments.find(a=>String(a.job_id)===String(id)&&(a.profile_id===myId()||a.employee_id===myId())); if(!row)return; const r=await sb.from("job_assignments").delete().eq("id",row.id); if(r.error)return msg(r.error.message); await loadAll(); render(); }
async function saveTime(e){ e.preventDefault(); const f=new FormData(e.target),id=f.get("id"),pid=f.get("profile_id")||myId(); const row={profile_id:pid,employee_id:pid,job_id:f.get("job_id")||null,work_date:f.get("work_date"),start_time:f.get("start_time"),end_time:f.get("end_time"),break_minutes:Number(f.get("break_minutes")||0),location:f.get("location"),activity:f.get("activity"),description:f.get("description"),hours_worked:Number(f.get("hours_worked")||0),hours:Number(f.get("hours_worked")||0),approved:f.get("approved")==="on",status:f.get("approved")==="on"?"approved":"pending"}; const r=id?await sb.from("timesheets").update(row).eq("id",id):await sb.from("timesheets").insert(row); if(r.error)return msg(r.error.message); closeModal(); await loadAll(); render(); }
async function delTime(id){ if(confirm("Stundeneintrag löschen?")){const r=await sb.from("timesheets").delete().eq("id",id); if(r.error)return msg(r.error.message); await loadAll(); render();} }
async function saveLeave(e){ e.preventDefault(); const f=new FormData(e.target),id=f.get("id"),pid=f.get("profile_id")||myId(); const row={profile_id:pid,employee_id:pid,type:f.get("leave_type"),leave_type:f.get("leave_type"),start_date:f.get("start_date"),end_date:f.get("end_date"),reason:f.get("reason"),status:id?f.get("status"):"pending"}; const r=id?await sb.from("leave_requests").update(row).eq("id",id):await sb.from("leave_requests").insert(row); if(r.error)return msg(r.error.message); closeModal(); await loadAll(); render(); }
async function reviewLeave(id,status){ const r=await sb.from("leave_requests").update({status,approved:status==="approved",reviewed_at:new Date().toISOString(),reviewed_by:myId()}).eq("id",id); if(r.error)return msg(r.error.message); await loadAll(); render(); }
async function saveProfile(e){ e.preventDefault(); const f=new FormData(e.target); const row={full_name:f.get("full_name"),phone:f.get("phone"),role:f.get("role"),approved:f.get("approved")==="on",guard_id:f.get("guard_id"),tax_id:f.get("tax_id"),address:f.get("address"),emergency_contact:f.get("emergency_contact"),qualification:f.get("qualification"),iban:f.get("iban")}; const r=await sb.from("profiles").update(row).eq("id",f.get("id")); if(r.error)return msg(r.error.message); closeModal(); await loadProfile(); render(); }
async function uploadPayroll(e){ e.preventDefault(); const f=new FormData(e.target); const file=f.get("file"),pid=f.get("profile_id"),month=f.get("month"); if(!file||!pid)return msg("Mitarbeiter und PDF auswählen."); const path=`${pid}/${Date.now()}-${file.name}`; const up=await sb.storage.from("payslips").upload(path,file,{upsert:true}); if(up.error)return msg(up.error.message); const r=await sb.from("payroll_documents").insert({profile_id:pid,title:`Lohnabrechnung ${month}`,month,file_path:path,file_name:file.name,uploaded_by:myId()}); if(r.error)return msg(r.error.message); closeModal(); await loadAll(); render(); }
async function openFile(path){ const {data,error}=await sb.storage.from("payslips").createSignedUrl(path,120); if(error)return msg(error.message); window.open(data.signedUrl,"_blank"); }
async function uploadDoc(e){ e.preventDefault(); const f=new FormData(e.target),file=f.get("file"); if(!file)return msg("Datei auswählen."); const path=`docs/${Date.now()}-${file.name}`; const up=await sb.storage.from("payslips").upload(path,file,{upsert:true}); if(up.error)return msg(up.error.message); const r=await sb.from("company_documents").insert({title:f.get("title"),description:f.get("description"),file_path:path,file_name:file.name,visible_to:"all",created_by:myId()}); if(r.error)return msg(r.error.message); closeModal(); await loadAll(); render(); }
function render(){ if(!state.session){root.innerHTML=authHtml();bind();return;} if(state.profile&&!state.profile.approved){root.innerHTML=`<div class="auth"><div class="auth-card"><h1>SXG Portal</h1><p>Dein Konto wartet auf Admin-Freigabe.</p><button onclick="location.reload()">Status neu laden</button><br><br><button class="secondary" onclick="logout()">Abmelden</button></div></div>`;return;} root.innerHTML=appHtml(); bind(); }
function authHtml(){return `<div class="auth"><div class="auth-card"><h1>SXG Sicherheit & Service</h1><p>Mitarbeiterportal</p><form id="loginForm"><input name="email" placeholder="E-Mail" required><input name="password" type="password" placeholder="Passwort" required><button>Anmelden</button></form><hr><h3>Registrieren</h3><form id="regForm"><input name="name" placeholder="Name" required><input name="phone" placeholder="Telefon"><input name="email" placeholder="E-Mail" required><input name="password" type="password" placeholder="Passwort" required><button>Registrieren</button></form></div></div>`;}
function appHtml(){ const adminPages=[["dashboard","Dashboard"],["jobs","Aufträge"],["assignments","Einsätze"],["schedule","Dienstplan"],["adminhours","Stunden Admin"],["leave","Urlaub/Krank"],["employees","Mitarbeiter"],["payroll","Lohnabrechnungen"],["catalog","Katalog"],["profile","Profil"]]; const empPages=[["dashboard","Dashboard"],["jobs","Offene Einsätze"],["assignments","Meine Einsätze"],["schedule","Mein Dienstplan"],["timesheets","Meine Stunden"],["leave","Mein Urlaub/Krank"],["payroll","Lohnabrechnungen"],["catalog","Katalog"],["profile","Profil"]]; const pages=admin()?adminPages:empPages; return `<div class="app"><aside class="side ${state.openSide?'open':''}"><div class="logo">SXG<small>Sicherheit & Service GmbH</small></div><div class="nav">${pages.map(p=>`<button class="${state.page===p[0]?'active':''}" onclick="setPage('${p[0]}')">${p[1]}</button>`).join("")}</div><div class="userbox"><b>${esc(state.profile.full_name)}</b><br><small>${admin()?'Admin':'Mitarbeiter'}</small><br><br><button class="secondary" onclick="askPush()">Push aktivieren</button></div></aside><main class="main"><div class="top"><button class="mobile secondary" onclick="state.openSide=!state.openSide;render()">☰</button><div><h1>${pages.find(p=>p[0]===state.page)?.[1]||"Portal"}</h1><p>${admin()?'Adminbereich':'Mitarbeiterbereich - nur eigene Daten sichtbar'}</p></div><button class="secondary" onclick="logout()">Abmelden</button></div>${contentHtml()}</main>${modalHtml()}</div>`;}
function myTimes(){return state.timesheets.filter(t=>(t.profile_id||t.employee_id)===myId());} function myLeaves(){return state.leaves.filter(l=>(l.profile_id||l.employee_id)===myId());} function myAssignments(){return state.assignments.filter(a=>(a.profile_id||a.employee_id)===myId());} function futureAssignments(rows){return rows.filter(a=>{const j=jobOf(a.job_id);return !j||!jobDate(j)||jobDate(j)>=todayISO();});}
function contentHtml(){ if(state.page==="dashboard"){ if(admin())return `<div class="notice">Admin sieht alle Daten. Mitarbeiter sehen nur ihre eigenen Daten.</div><div class="cards"><div class="card"><h3>Aufträge</h3><h1>${state.jobs.length}</h1></div><div class="card"><h3>Mitarbeiter</h3><h1>${state.profiles.length}</h1></div><div class="card"><h3>Alle Stunden</h3><h1>${state.timesheets.reduce((s,t)=>s+Number(t.hours_worked||t.hours||0),0)}</h1></div><div class="card"><h3>Offene Urlaube</h3><h1>${state.leaves.filter(l=>(l.status||'pending')==='pending').length}</h1></div></div>`; return `<div class="notice">Du siehst hier nur deine eigenen Daten.</div><div class="cards"><div class="card"><h3>Offene Einsätze</h3><h1>${state.jobs.filter(j=>(j.status||'open')==='open'&&(!jobDate(j)||jobDate(j)>=todayISO())).length}</h1></div><div class="card"><h3>Meine Einsätze</h3><h1>${futureAssignments(myAssignments()).length}</h1></div><div class="card"><h3>Meine Stunden</h3><h1>${myTimes().reduce((s,t)=>s+Number(t.hours_worked||t.hours||0),0)}</h1></div><div class="card"><h3>Meine Urlaube</h3><h1>${myLeaves().length}</h1></div></div>`;} if(state.page==="jobs")return jobsHtml(); if(state.page==="assignments")return assignmentsHtml(); if(state.page==="schedule")return scheduleHtml(); if(state.page==="timesheets")return timesHtml(false); if(state.page==="adminhours")return timesHtml(true); if(state.page==="leave")return leaveHtml(); if(state.page==="employees")return employeesHtml(); if(state.page==="payroll")return payrollHtml(); if(state.page==="catalog")return catalogHtml(); if(state.page==="profile")return profileHtml(); }
function jobsHtml(){ const list=state.jobs.filter(j=>admin()||((j.status||"open")==="open"&&(!jobDate(j)||jobDate(j)>=todayISO()))); return `<section class="panel"><div class="toolbar"><h2>${admin()?'Aufträge verwalten':'Offene Einsätze'}</h2>${admin()?`<button onclick="openModal('job')">+ Auftrag erstellen</button>`:""}</div><div class="table">${list.map(j=>{const count=assignedCount(j.id),max=Number(j.needed_employees||1),full=count>=max,mine=isAssigned(j.id);return `<div class="row"><div><b>${esc(j.title)}</b><br>${esc(j.client)} · ${esc(j.location)}<br>${esc(jobDate(j))} ${esc(j.start_time)}–${esc(j.end_time)}<br><small>${esc(j.notes)}</small>${admin()?`<br><b>Eingetragen:</b> ${assignedNames(j.id).map(esc).join(", ")||"niemand"}`:""}</div><span>${count}/${max} belegt</span><span class="badge ${full?'warn':'ok'}">${full?'voll':'frei'}</span><div>${admin()?`<button class="secondary" onclick="openModal('job',${j.id})">Bearbeiten</button> <button class="danger" onclick="delJob(${j.id})">Löschen</button>`:mine?`<button class="secondary" onclick="unassignJob(${j.id})">Austragen</button>`:`<button onclick="assignJob(${j.id})" ${full?'disabled':''}>Eintragen</button>`}</div></div>`}).join("")||`<div class="empty">Keine Einsätze vorhanden</div>`}</div></section>`;}
function assignmentsHtml(){ const rows=admin()?futureAssignments(state.assignments):futureAssignments(myAssignments()); return `<section class="panel"><h2>${admin()?'Aktuelle Einsätze':'Meine aktuellen Einsätze'}</h2><div class="table">${rows.map(a=>{const j=jobOf(a.job_id)||{};return `<div class="row"><div><b>${esc(j.title||"Einsatz")}</b><br>${esc(j.location||"")} · ${esc(jobDate(j))} ${esc(j.start_time)}-${esc(j.end_time)}</div><span>${admin()?esc(nameOf(a.profile_id||a.employee_id)):""}</span><span class="badge ok">aktuell</span><span></span></div>`}).join("")||`<div class="empty">Keine aktuellen Einsätze</div>`}</div></section>`;}
function scheduleHtml(){ const rows=admin()?state.assignments:myAssignments(); const items=rows.map(a=>({a,j:jobOf(a.job_id)})).filter(x=>x.j&&jobDate(x.j)); const d=new Date(),y=d.getFullYear(),m=d.getMonth(),last=new Date(y,m+1,0),days=[]; for(let i=1;i<=last.getDate();i++)days.push(new Date(y,m,i+1).toISOString().slice(0,10)); return `<section class="panel"><h2>Dienstplan Kalender</h2><div class="calendar">${days.map(day=>{const jobs=items.filter(x=>jobDate(x.j)===day);return `<div class="day"><b>${day.slice(8,10)}.${day.slice(5,7)}</b>${jobs.map(x=>`<span class="mini">${esc(x.j.start_time)} ${esc(x.j.title)} ${admin()?`· ${esc(nameOf(x.a.profile_id||x.a.employee_id))}`:""}</span>`).join("")}</div>`}).join("")}</div></section>`;}
function timesHtml(all){ const rows=all&&admin()?state.timesheets:myTimes(); return `<section class="panel"><div class="toolbar"><h2>${all?'Alle Mitarbeiterstunden':'Meine Stunden'}</h2><button onclick="openModal('time')">+ ${admin()?'Stunden nachtragen':'Stunden eintragen'}</button></div><div class="table">${rows.map(t=>`<div class="row"><div><b>${esc(all?nameOf(t.profile_id||t.employee_id):"Meine Stunden")}</b><br>${esc(t.work_date)} · ${esc(t.start_time)}–${esc(t.end_time)} · ${esc(t.location)}<br>${esc(t.activity)} · ${esc(t.description)}</div><span>${esc(t.hours_worked||t.hours||"")} Std.</span><span class="badge ${t.approved?'ok':'warn'}">${esc(t.status||"pending")}</span><div><button class="secondary" onclick="openModal('time',${t.id})">Bearbeiten</button>${admin()?` <button class="danger" onclick="delTime(${t.id})">Löschen</button>`:""}</div></div>`).join("")||`<div class="empty">Keine Stunden vorhanden</div>`}</div></section>`;}
function leaveHtml(){ const rows=admin()?state.leaves:myLeaves(); return `<section class="panel"><div class="toolbar"><h2>${admin()?'Urlaub/Krank verwalten':'Mein Urlaub / Krankmeldung'}</h2><button onclick="openModal('leave')">+ Antrag</button></div><div class="table">${rows.map(l=>`<div class="row"><div><b>${esc(admin()?nameOf(l.profile_id||l.employee_id):"Mein Antrag")}</b><br>${esc(l.leave_type||l.type)} · ${esc(l.start_date)} bis ${esc(l.end_date)}<br>${esc(l.reason)}</div><span></span><span class="badge ${l.status==='approved'?'ok':l.status==='rejected'?'bad':'warn'}">${esc(l.status||"pending")}</span><div>${admin()?`<button onclick="reviewLeave(${l.id},'approved')">Genehmigen</button> <button class="danger" onclick="reviewLeave(${l.id},'rejected')">Ablehnen</button>`:""}</div></div>`).join("")||`<div class="empty">Keine Anträge</div>`}</div></section>`;}
function employeesHtml(){ return `<section class="panel"><h2>Mitarbeiter-Katalog</h2><div class="cards">${state.profiles.map(p=>`<div class="card"><h3>${esc(p.full_name)}</h3><p>${esc(p.email)}</p><p><span class="badge ${p.approved?'ok':'warn'}">${esc(p.role)} · ${p.approved?'aktiv':'wartet'}</span></p><p>Bewacher-ID: ${esc(p.guard_id||"—")}<br>Steuer-ID: ${esc(p.tax_id||"—")}</p><button onclick="openModal('profile','${p.id}')">Bearbeiten/Freigeben</button></div>`).join("")}</div></section>`;}
function payrollHtml(){ const rows=admin()?state.payslips:state.payslips.filter(p=>p.profile_id===myId()); return `<section class="panel"><div class="toolbar"><h2>Lohnabrechnungen PDF</h2>${admin()?`<button onclick="openModal('payroll')">+ PDF hochladen</button>`:""}</div><div class="table">${rows.map(p=>`<div class="row"><div><b>${esc(p.title||"Lohnabrechnung")}</b><br>${esc(admin()?nameOf(p.profile_id):"Meine Abrechnung")} · ${esc(p.month||"")}</div><span>${esc(p.file_name||"PDF")}</span><span class="badge ok">PDF</span><button onclick="openFile('${esc(p.file_path)}')">Öffnen</button></div>`).join("")||`<div class="empty">Keine Lohnabrechnungen vorhanden</div>`}</div></section>`;}
function catalogHtml(){ return `<section class="panel"><div class="toolbar"><h2>Katalog / Dokumente</h2>${admin()?`<button onclick="openModal('doc')">+ Dokument hochladen</button>`:""}</div><div class="pillbox"><span class="pill">Dienstanweisungen</span><span class="pill">Objektschutz</span><span class="pill">Brandschutz</span><span class="pill">Arbeitskleidung</span><span class="pill">Schulungen</span></div><br><div class="table">${state.docs.map(d=>`<div class="row"><div><b>${esc(d.title)}</b><br>${esc(d.description)}</div><span>${esc(d.file_name||"")}</span><span class="badge">Dokument</span><button onclick="openFile('${esc(d.file_path)}')">Öffnen</button></div>`).join("")||`<div class="empty">Noch keine Dokumente im Katalog</div>`}</div></section>`;}
function profileHtml(){ return `<section class="panel"><h2>Mein Profil</h2><div class="grid2"><div class="card"><b>${esc(state.profile.full_name)}</b><p>${esc(state.profile.email)}</p><p>Bewacher-ID: ${esc(state.profile.guard_id||"—")}</p><p>Steuer-ID: ${esc(state.profile.tax_id||"—")}</p><p>Notfallkontakt: ${esc(state.profile.emergency_contact||"—")}</p><button onclick="openModal('profile','${state.profile.id}')">Profil bearbeiten</button></div><div class="card"><h3>Benachrichtigungen</h3><p>Für Erinnerungen an Schichten und neue Einsätze bitte aktivieren.</p><button onclick="askPush()">Push aktivieren</button></div></div></section>`;}
function modalHtml(){ if(!state.modal)return""; const {type,id}=state.modal; if(type==="job"){ const j=state.jobs.find(x=>String(x.id)===String(id))||{}; return modal("Auftrag",`<form class="form" id="jobForm"><input type="hidden" name="id" value="${esc(j.id||"")}"><input name="title" placeholder="Titel" value="${esc(j.title||"")}"><input name="client" placeholder="Kunde" value="${esc(j.client||"")}"><input name="location" placeholder="Standort" value="${esc(j.location||"")}"><input type="date" name="job_date" value="${esc(j.job_date||j.start_date||"")}"><input name="start_time" placeholder="Start" value="${esc(j.start_time||"")}"><input name="end_time" placeholder="Ende" value="${esc(j.end_time||"")}"><input type="number" name="needed_employees" placeholder="Mitarbeiter gesucht" value="${esc(j.needed_employees||1)}"><input name="status" value="${esc(j.status||"open")}"><textarea class="full" name="notes" placeholder="Hinweise">${esc(j.notes||"")}</textarea><button>Speichern</button></form>`);} if(type==="time"){ const t=state.timesheets.find(x=>String(x.id)===String(id))||{}; return modal("Stunden",`<form class="form" id="timeForm"><input type="hidden" name="id" value="${esc(t.id||"")}">${admin()?`<select name="profile_id">${state.profiles.map(p=>`<option value="${p.id}" ${(t.profile_id||myId())===p.id?"selected":""}>${esc(p.full_name||p.email)}</option>`).join("")}</select>`:""}<select name="job_id"><option value="">Kein Auftrag</option>${state.jobs.map(j=>`<option value="${j.id}" ${String(t.job_id)===String(j.id)?"selected":""}>${esc(j.title)}</option>`).join("")}</select><input type="date" name="work_date" value="${esc(t.work_date||"")}"><input name="start_time" placeholder="Start" value="${esc(t.start_time||"")}"><input name="end_time" placeholder="Ende" value="${esc(t.end_time||"")}"><input type="number" name="break_minutes" placeholder="Pause Minuten" value="${esc(t.break_minutes||0)}"><input type="number" step="0.25" name="hours_worked" placeholder="Stunden" value="${esc(t.hours_worked||t.hours||"")}"><input name="location" placeholder="Standort" value="${esc(t.location||"")}"><input name="activity" placeholder="Tätigkeit" value="${esc(t.activity||"")}"><textarea class="full" name="description" placeholder="Beschreibung">${esc(t.description||"")}</textarea>${admin()?`<label class="full"><input type="checkbox" name="approved" ${t.approved?"checked":""}> freigegeben</label>`:""}<button>Speichern</button></form>`);} if(type==="leave"){ const l=state.leaves.find(x=>String(x.id)===String(id))||{}; return modal("Urlaub / Krankmeldung",`<form class="form" id="leaveForm"><input type="hidden" name="id" value="${esc(l.id||"")}">${admin()?`<select name="profile_id">${state.profiles.map(p=>`<option value="${p.id}" ${(l.profile_id||myId())===p.id?"selected":""}>${esc(p.full_name||p.email)}</option>`).join("")}</select>`:""}<select name="leave_type"><option>Urlaub</option><option>Krankmeldung</option><option>Sonstiges</option></select><input type="date" name="start_date" value="${esc(l.start_date||"")}"><input type="date" name="end_date" value="${esc(l.end_date||"")}"><input class="full" name="reason" placeholder="Grund" value="${esc(l.reason||"")}"><input type="hidden" name="status" value="${esc(l.status||"pending")}"><button>Speichern</button></form>`);} if(type==="profile"){ const p=state.profiles.find(x=>x.id===id)||state.profile; const canEditAdmin=admin(); return modal("Profil",`<form class="form" id="profileForm"><input type="hidden" name="id" value="${esc(p.id)}"><input name="full_name" placeholder="Name" value="${esc(p.full_name||"")}"><input name="phone" placeholder="Telefon" value="${esc(p.phone||"")}">${canEditAdmin?`<input name="role" placeholder="Rolle" value="${esc(p.role||"employee")}">`:`<input name="role" type="hidden" value="${esc(p.role||"employee")}">`}<input name="guard_id" placeholder="Bewacher-ID" value="${esc(p.guard_id||"")}"><input name="tax_id" placeholder="Steuer-ID" value="${esc(p.tax_id||"")}"><input name="address" placeholder="Adresse" value="${esc(p.address||"")}"><input name="emergency_contact" placeholder="Notfallkontakt" value="${esc(p.emergency_contact||"")}"><input name="qualification" placeholder="Qualifikation" value="${esc(p.qualification||"")}"><input name="iban" placeholder="IBAN" value="${esc(p.iban||"")}">${canEditAdmin?`<label class="full"><input type="checkbox" name="approved" ${p.approved?"checked":""}> freigegeben</label>`:`<input name="approved" type="hidden" value="${p.approved?'on':''}">`}<button>Speichern</button></form>`);} if(type==="payroll")return modal("Lohnabrechnung hochladen",`<form class="form" id="payrollForm"><select name="profile_id">${state.profiles.map(p=>`<option value="${p.id}">${esc(p.full_name||p.email)}</option>`).join("")}</select><input name="month" placeholder="Monat z.B. 2026-05"><input class="full" name="file" type="file" accept="application/pdf"><button>PDF hochladen</button></form>`); if(type==="doc")return modal("Katalog-Dokument hochladen",`<form class="form" id="docForm"><input name="title" placeholder="Titel"><input name="description" placeholder="Beschreibung"><input class="full" name="file" type="file"><button>Dokument hochladen</button></form>`);}
function modal(title,body){return `<div class="modal"><div class="modalbox"><div class="modalhead"><h2>${title}</h2><button class="secondary" onclick="closeModal()">X</button></div>${body}</div></div>`;}
function bind(){ document.getElementById("loginForm")?.addEventListener("submit",login); document.getElementById("regForm")?.addEventListener("submit",register); document.getElementById("jobForm")?.addEventListener("submit",saveJob); document.getElementById("timeForm")?.addEventListener("submit",saveTime); document.getElementById("leaveForm")?.addEventListener("submit",saveLeave); document.getElementById("profileForm")?.addEventListener("submit",saveProfile); document.getElementById("payrollForm")?.addEventListener("submit",uploadPayroll); document.getElementById("docForm")?.addEventListener("submit",uploadDoc); }
window.setPage=setPage; window.openModal=openModal; window.closeModal=closeModal; window.logout=logout; window.delJob=delJob; window.assignJob=assignJob; window.unassignJob=unassignJob; window.delTime=delTime; window.reviewLeave=reviewLeave; window.askPush=askPush; window.openFile=openFile; window.state=state; window.render=render; init();
</script>
</body>
</html>
