}
function isJobExpired(j){

function calcNetHours(start,end,breakMin){
  if(!start||!end)return 0;
  const a=String(start).split(":").map(Number), b=String(end).split(":").map(Number);
  if(a.length<2||b.length<2||Number.isNaN(a[0])||Number.isNaN(b[0]))return 0;

  return Math.max(0,(e-s-Number(breakMin||0))/60);
}

function overlapMinutes(start,end,pStart,pEnd){
  if(!start||!end||!pStart||!pEnd)return 0
  const toMin=x=>{const a=String(x).split(":").map(Number);return (a[0]||0)*60+(a[1]||0)}
  let s=toMin(start), e=toMin(end), ps=toMin(pStart), pe=toMin(pEnd)
  if(e<=s)e+=1440
  let ranges=[[s,e]]
  if(pe<=ps) pe+=1440
  let total=0
  for(const [rs,re] of ranges){
    total+=Math.max(0,Math.min(re,pe)-Math.max(rs,ps))
    total+=Math.max(0,Math.min(re,pe+1440)-Math.max(rs,ps+1440))
  }
  return total
}
function premiumForTime(t,rate){

    const mins=overlapMinutes(t.start_time,t.end_time,p.start_time,p.end_time)
    if(mins>0) extra += (mins/60)*rate*(Number(p.percent||0)/100)
  })
  return extra
}

async function checkIn(jobId){
  await loadAll();
  const j=jobOf(jobId);
  if(!j)return msg("Einsatz nicht gefunden.");
  if(!navigator.geolocation)return msg("GPS nicht verfügbar.");

  const already=state.attendance.find(a=>
    (a.profile_id||a.employee_id)===myId() &&
    !a.check_out &&
    !a.clock_out
  );
  if(already)return msg("Du bist bereits eingecheckt. Bitte erst auschecken.");

  if(!j.lat || !j.lng){
    return msg("Für diesen Auftrag fehlen GPS-Koordinaten. Admin muss Latitude und Longitude beim Auftrag eintragen.");
  }

  const start=new Date(`${jobDate(j)}T${String(j.start_time||"00:00").slice(0,5)}:00`);
  const end=new Date(`${jobDate(j)}T${String(j.end_time||"23:59").slice(0,5)}:00`);
  if(end < start) end.setDate(end.getDate()+1);
  const nowDate=new Date();

  if(nowDate.getTime()>end.getTime()){
    return msg("Der Einsatz ist bereits beendet.");
  }
  if(nowDate.getTime()>start.getTime()+15*60*1000){
    return msg("Check-in ist nur bis 15 Minuten nach Beginn möglich. Admin kann dich nachträglich einchecken.");
  }

  navigator.geolocation.getCurrentPosition(async pos=>{
    const lat=pos.coords.latitude,lng=pos.coords.longitude;
    const dist=hav(lat,lng,Number(j.lat),Number(j.lng));
    const radius=Number(j.geo_radius_m||1000);
    if(dist>radius){
      return msg("Du bist zu weit vom Einsatzort entfernt. Entfernung: "+Math.round(dist)+" m / erlaubt: "+radius+" m");
    }

    const iso=new Date().toISOString();
    const r=await sb.from("attendance").insert({
      profile_id:myId(),
      employee_id:myId(),
      job_id:jobId,
      check_in:iso,
      clock_in:iso,
      lat,lng,
      present:true
    });

    if(r.error)return msg(r.error.message);

    startTracking(jobId);
    await loadAll();
    state.page="assignments";
    render();
  },()=>msg("GPS erlauben, sonst kein Check-in möglich."),{enableHighAccuracy:true,timeout:12000,maximumAge:0});
}
async function checkOut(){
  await loadAll();

  const open=state.attendance.find(a=>
    (a.profile_id||a.employee_id)===myId() &&
    !a.check_out &&
    !a.clock_out
  );

  if(!open)return msg("Kein offener Check-in.");

  const out=new Date().toISOString();

  const r=await sb.from("attendance").update({
    check_out:out,
    clock_out:out,
    present:false
  }).eq("id",open.id);

  if(r.error)return msg(r.error.message);

  stopTracking();
  await loadAll();

  // Fallback, falls der DB-Trigger noch nicht aktiv war.
  const created=state.timesheets.some(t=>String(t.attendance_id||"")===String(open.id));
  if(!created && typeof createTimesheetFromAttendance==="function"){
    await createTimesheetFromAttendance(open,out);
    await loadAll();
  }

  state.page="assignments";
  render();
}
async function createTimesheetFromAttendance(att,outIso){
  const inIso=att.check_in||att.clock_in;
  if(!inIso||!outIso)return;
  const old=state.timesheets.find(t=>String(t.attendance_id||"")===String(att.id));
  const j=jobOf(att.job_id)||{};
  const minutes=minsBetween(inIso,outIso);
  const hours=Math.max(0,Math.round((minutes/60)*10000)/10000);
  const row={
    profile_id:att.profile_id||att.employee_id||myId(),
    employee_id:att.profile_id||att.employee_id||myId(),
    job_id:att.job_id||null,
    work_date:isoDate(inIso),
    start_time:isoTime(inIso),
    end_time:isoTime(outIso),
    break_minutes:0,
    location:j.location||j.address||"",
    activity:j.title||"Einsatz",
    description:"Automatisch aus Check-in/Check-out erstellt",
    hours_worked:hours,
    hours:hours,
    approved:false,
    status:"pending",
    attendance_id:att.id
  };
  const r=old?await sb.from("timesheets").update(row).eq("id",old.id):await sb.from("timesheets").insert(row);
  if(r.error)console.error("Timesheet auto error",r.error);
}
function startTracking(jobId){stopTracking();if(!navigator.geolocation)return;state.watchId=navigator.geolocation.watchPosition(async p=>{await sb.from("location_logs").insert({profile_id:myId(),job_id:jobId,lat:p.coords.latitude,lng:p.coords.longitude,accuracy:p.coords.accuracy})},()=>{},{enableHighAccuracy:true,maximumAge:10000,timeout:15000})}
function stopTracking(){if(state.watchId!==null){navigator.geolocation.clearWatch(state.watchId);state.watchId=null}}

function assignmentStatus(a){
  const pid=a.profile_id||a.employee_id
  const att=state.attendance.find(x=>String(x.job_id)===String(a.job_id)&&(x.profile_id||x.employee_id)===pid)
  const ts=state.timesheets.find(t=>String(t.job_id||"")===String(a.job_id||"")&&(t.profile_id||t.employee_id)===pid)
  if(att&&att.check_in&&!att.check_out&&!att.clock_out)return "läuft"
  if(ts || (att&&(att.check_out||att.clock_out)))return "abgeschlossen"
  if(isJobExpired(jobOf(a.job_id)||{}))return "abgelaufen"
  return "aktuell"
}
function assignmentTimes(a){
  const att=state.attendance.find(x=>String(x.job_id)===String(a.job_id)&&(x.profile_id===(a.profile_id||a.employee_id)))
  const ts=state.timesheets.find(t=>String(t.job_id)===String(a.job_id)&&(t.profile_id||t.employee_id)===(a.profile_id||a.employee_id))
  if(att)return `${att.check_in?new Date(att.check_in).toLocaleString():""} ${att.check_out?"bis "+new Date(att.check_out).toLocaleString():""}`
  if(ts)return `${esc(ts.work_date||"")} ${esc(ts.start_time||"")} - ${esc(ts.end_time||"")}`
  return ""
}
function assignmentHours(a){
  const ts=state.timesheets.find(t=>String(t.job_id)===String(a.job_id)&&(t.profile_id||t.employee_id)===(a.profile_id||a.employee_id))
  return ts?Number(ts.hours_worked||ts.hours||0).toFixed(2)+" h":""
}
function assignmentRow(a,history=false){
  const j=jobOf(a.job_id)||{}, status=assignmentStatus(a), pid=a.profile_id||a.employee_id
  const open=state.attendance.find(x=>(x.profile_id||x.employee_id)===pid && String(x.job_id)===String(a.job_id) && !x.check_out && !x.clock_out)
  const ts=state.timesheets.find(t=>String(t.id||"")===String(a.timesheet_id||"") || ((t.profile_id||t.employee_id)===pid && String(t.job_id||"")===String(a.job_id||"")))
  const hours=ts?Number(ts.hours_worked||ts.hours||0).toFixed(4)+" h":assignmentHours(a)
  const actual=ts?`${esc(ts.work_date||"")} ${esc(ts.start_time||"")} - ${esc(ts.end_time||"")}`:assignmentTimes(a)
  return `<div class="row">
    <div>
      <b>${esc(j.title||ts?.activity||"Einsatz")}</b><br>
      ${esc(j.location||ts?.location||"")} ${j.address?`· ${esc(j.address)}`:""}<br>
      ${j.id?`Plan: ${esc(jobDate(j))} ${esc(j.start_time)}-${esc(j.end_time)}<br>`:""}
      ${actual?`Tatsächlich: ${actual}<br>`:""}
      ${admin()?`Mitarbeiter: <b>${esc(nameOf(pid))}</b>`:""}
    </div>
    <span>${hours}</span>
    <span class="badge ${open?'warn':ts||status==="abgeschlossen"?'ok':status==="abgelaufen"?'warn':'ok'}">${open?'läuft':ts?'abgeschlossen':status}</span>
    <span>
      ${open&&!admin()?`<button class="ok" onclick="checkOut()">Auschecken</button>`:""}
      ${open&&admin()?`<button class="ok" onclick="openModal('adminClockOut')">Auschecken</button>`:""}
      ${j.lat&&j.lng?`<button class="secondary" onclick="window.open('https://www.google.com/maps?q=${j.lat},${j.lng}','_blank')">Ort</button>`:""}
    </span>
  </div>`
}
function historyFromTimesheets(){
  return state.timesheets
    .filter(t=>admin()||((t.profile_id||t.employee_id)===myId()))
    .map(t=>({job_id:t.job_id,profile_id:t.profile_id||t.employee_id,fromTimesheet:true,timesheet_id:t.id}))
}
function uniqueAssignmentRows(rows){
  const seen=new Set(), out=[];
  rows.forEach(a=>{const key=String(a.job_id||"none")+"-"+String(a.profile_id||a.employee_id||"me")+"-"+String(a.timesheet_id||"assignment");if(!seen.has(key)){seen.add(key);out.push(a)}});
  return out
}
function assignmentsHtml(){
  const baseRows=admin()?state.assignments:myAssignments();
  const histRows=historyFromTimesheets();
  const allRows=uniqueAssignmentRows([...baseRows,...histRows]);
  const current=baseRows.filter(a=>{const j=jobOf(a.job_id);return !j||(!isJobExpired(j)&&assignmentStatus(a)!=="abgeschlossen")});
  const history=allRows.filter(a=>{const j=jobOf(a.job_id);if(a.fromTimesheet)return true;return j&&(isJobExpired(j)||assignmentStatus(a)==="abgeschlossen")});
  return `<section class="panel"><h2>${admin()?'Einsätze Übersicht':'Meine Einsätze'}</h2><h3>Aktuell</h3><div class="table">${current.map(a=>assignmentRow(a,false)).join("")||`<div class="empty">Keine aktuellen Einsätze</div>`}</div><br><h3>Einsatz-Historie</h3><div class="table">${history.map(a=>assignmentRow(a,true)).join("")||`<div class="empty">Noch keine abgeschlossenen Einsätze</div>`}</div></section>`
}

window.sxgGeocodeAddress = async function(address){
  if(!address)return null;
  try{
    const r=await fetch("https://nominatim.openstreetmap.org/search?format=json&limit=1&q="+encodeURIComponent(address),{headers:{"Accept":"application/json"}});
    const d=await r.json();
    if(d&&d[0])return {lat:Number(d[0].lat),lng:Number(d[0].lon)};
  }catch(e){}
  return null;
};
window.sxgOpenAttendance = function(pid,jobId=null){
  return state.attendance.find(a=>(a.profile_id||a.employee_id)===pid&&!a.check_out&&!a.clock_out&&(!jobId||String(a.job_id)===String(jobId)));
};
window.sxgTimesheetFor = function(pid,jobId,attendanceId=null){
  return state.timesheets.find(t=>(attendanceId&&String(t.attendance_id||"")===String(attendanceId))||((t.profile_id||t.employee_id)===pid&&String(t.job_id||"")===String(jobId||"")));
};
window.sxgJobStart = function(j){
  const d=jobDate(j)||j?.start_date||"";
  if(!d)return null;
  const t=String(j?.start_time||"00:00").slice(0,5);
  const dt=new Date(`${d}T${t}:00`);
  return isNaN(dt.getTime())?null:dt;
};
window.sxgJobEnd = function(j){
  const d=jobDate(j)||j?.start_date||"";
  if(!d)return null;
  const t=String(j?.end_time||"23:59").slice(0,5);
  const dt=new Date(`${d}T${t}:00`);
  const st=window.sxgJobStart(j);
  if(st&&dt<st)dt.setDate(dt.getDate()+1);
  return isNaN(dt.getTime())?null:dt;
};
window.sxgJobExpired = function(j){const e=window.sxgJobEnd(j);return !!e&&Date.now()>e.getTime()};
window.sxgCheckInReason = function(j){
  const st=window.sxgJobStart(j), en=window.sxgJobEnd(j), now=Date.now();
  if(en&&now>en.getTime())return "Der Einsatz ist bereits beendet.";
  if(st&&now>st.getTime()+15*60*1000)return "Check-in ist nur bis 15 Minuten nach Beginn möglich. Admin kann nachträglich einchecken.";
  return "";
};
window.sxgMinutes = function(a,b){const A=new Date(a).getTime(),B=new Date(b).getTime();return (!A||!B||B<A)?0:(B-A)/60000};
window.sxgIsoDate = function(x){try{return new Date(x).toISOString().slice(0,10)}catch(e){return today()}};
window.sxgIsoTime = function(x){try{return new Date(x).toTimeString().slice(0,5)}catch(e){return ""}};

window.checkIn = async function(jobId){
  await loadAll();
  const j=jobOf(jobId);
  if(!j)return msg("Einsatz nicht gefunden.");
  const reason=window.sxgCheckInReason(j);
  if(reason)return msg(reason);
  if(window.sxgOpenAttendance(myId()))return msg("Du bist bereits eingecheckt. Bitte erst auschecken.");
  if(!navigator.geolocation)return msg("GPS nicht verfügbar.");
  if(j.require_location_tracking!==false && (!j.lat||!j.lng)){
    return msg("Für diesen Auftrag fehlen GPS-Daten. Admin muss Adresse/Koordinaten eintragen oder GPS/Radius deaktivieren.");
  }
  navigator.geolocation.getCurrentPosition(async pos=>{
    const lat=pos.coords.latitude,lng=pos.coords.longitude;
    if(j.require_location_tracking!==false){
      const dist=hav(lat,lng,Number(j.lat),Number(j.lng));
      const radius=Number(j.geo_radius_m||1000);
      if(dist>radius)return msg("Du bist zu weit vom Einsatzort entfernt. Entfernung: "+Math.round(dist)+" m / erlaubt: "+radius+" m");
    }
    const iso=new Date().toISOString();
    const r=await sb.from("attendance").insert({profile_id:myId(),employee_id:myId(),job_id:jobId,check_in:iso,clock_in:iso,lat,lng,present:true});
    if(r.error)return msg(r.error.message);
    startTracking(jobId);
    await loadAll();
    state.page="assignments";
    render();
  },()=>msg("GPS erlauben, sonst kein Check-in möglich."),{enableHighAccuracy:true,timeout:12000,maximumAge:0});
};
window.sxgFallbackTimesheet = async function(att,outIso){
  const inIso=att.check_in||att.clock_in;
  if(!inIso||!outIso)return;
  const pid=att.profile_id||att.employee_id||myId();
  if(state.timesheets.some(t=>String(t.attendance_id||"")===String(att.id)))return;
  const j=jobOf(att.job_id)||{};
  const hours=Math.max(0,Math.round((window.sxgMinutes(inIso,outIso)/60)*10000)/10000);
  const r=await sb.from("timesheets").insert({
    profile_id:pid,employee_id:pid,job_id:att.job_id||null,work_date:window.sxgIsoDate(inIso),
    start_time:window.sxgIsoTime(inIso),end_time:window.sxgIsoTime(outIso),break_minutes:0,
    location:j.location||j.address||"",activity:j.title||"Einsatz",
    description:"Automatisch aus Check-in/Check-out erstellt",hours_worked:hours,hours:hours,
    approved:false,status:"pending",attendance_id:att.id
  });
  if(r.error)console.error(r.error);
};
window.checkOut = async function(){
  await loadAll();
  const open=window.sxgOpenAttendance(myId());
  if(!open)return msg("Kein offener Check-in.");
  const out=new Date().toISOString();
  const r=await sb.from("attendance").update({check_out:out,clock_out:out,present:false}).eq("id",open.id);
  if(r.error)return msg(r.error.message);
  stopTracking();
  await loadAll();
  if(!state.timesheets.some(t=>String(t.attendance_id||"")===String(open.id))){
    await window.sxgFallbackTimesheet(open,out);
    await loadAll();
  }
  state.page="assignments";
  render();
};

window.startTracking = function(jobId){
  stopTracking();
  const j=jobOf(jobId)||{};
  if(!navigator.geolocation)return;
  state.watchId=navigator.geolocation.watchPosition(async p=>{
    const lat=p.coords.latitude,lng=p.coords.longitude;
    await sb.from("location_logs").insert({profile_id:myId(),job_id:jobId,lat,lng,accuracy:p.coords.accuracy});

      const dist=hav(lat,lng,Number(j.lat),Number(j.lng)), radius=Number(j.geo_radius_m||1000);
      if(dist>radius)await apiPush("Mitarbeiter außerhalb Radius",`${nameOf(myId())} ist ${Math.round(dist)} m vom Einsatzort entfernt.`);
    }
  },()=>{},{enableHighAccuracy:true,maximumAge:10000,timeout:15000});
};

/* SXG v10 Safety/Admin Patch */
window.sxgPid = window.sxgPid || function(a){return a?.profile_id||a?.employee_id||""};

window.sxgOpenAttendance = function(pid,jobId=null){
  return state.attendance.find(a =>
    window.sxgPid(a)===pid &&
    !a.check_out &&
    !a.clock_out &&
    (!jobId || String(a.job_id)===String(jobId))
  );
};

window.sxgJobStart = window.sxgJobStart || function(j){
  const d=jobDate(j)||j?.start_date||"";
  if(!d)return null;
  const dt=new Date(`${d}T${String(j?.start_time||"00:00").slice(0,5)}:00`);
  return isNaN(dt.getTime())?null:dt;
};

window.sxgJobEnd = window.sxgJobEnd || function(j){
  const d=jobDate(j)||j?.start_date||"";
  if(!d)return null;
  const dt=new Date(`${d}T${String(j?.end_time||"23:59").slice(0,5)}:00`);
  const st=window.sxgJobStart(j);
  if(st&&dt<st)dt.setDate(dt.getDate()+1);
  return isNaN(dt.getTime())?null:dt;
};

window.sxgAutoCheckoutExpired = async function(){
  if(!admin())return;
  await loadAll();
  const now=Date.now();
  for(const a of state.attendance.filter(x=>!x.check_out&&!x.clock_out)){
    const j=jobOf(a.job_id);
    if(!j)continue;
    const end=window.sxgJobEnd(j);
    if(!end)continue;
    const outMs=end.getTime()+15*60*1000;
    if(now>outMs){
      const outIso=new Date(outMs).toISOString();
      await sb.from("attendance").update({
        check_out:outIso,
        clock_out:outIso,
        present:false,
        auto_checkout:true
      }).eq("id",a.id);
    }
  }
};

  if(admin())await window.sxgAutoCheckoutExpired();
  await loadAll();
  render();
};

window.checkIn = async function(jobId){
  await loadAll();
  const j=jobOf(jobId);
  if(!j)return msg("Einsatz nicht gefunden.");
  if(window.sxgOpenAttendance(myId()))return msg("Du bist bereits eingecheckt. Erst auschecken, dann neu einchecken.");
  const st=window.sxgJobStart(j), en=window.sxgJobEnd(j), now=Date.now();
  if(en&&now>en.getTime())return msg("Der Einsatz ist bereits beendet.");
  if(st&&now>st.getTime()+15*60*1000)return msg("Check-in ist nur bis 15 Minuten nach Beginn möglich. Admin kann dich nachträglich einchecken.");
  if(!navigator.geolocation)return msg("GPS nicht verfügbar.");
  if(j.require_location_tracking!==false && (!j.lat||!j.lng))return msg("GPS-Daten fehlen. Admin muss Adresse/Koordinaten eintragen oder GPS deaktivieren.");

  navigator.geolocation.getCurrentPosition(async pos=>{
    const lat=pos.coords.latitude,lng=pos.coords.longitude;
    if(j.require_location_tracking!==false){
      const dist=hav(lat,lng,Number(j.lat),Number(j.lng));
      const radius=Number(j.geo_radius_m||1000);
      if(dist>radius)return msg("Du bist zu weit weg. Entfernung: "+Math.round(dist)+" m / erlaubt: "+radius+" m");
    }
    const iso=new Date().toISOString();
    const r=await sb.from("attendance").insert({
      profile_id:myId(),
      employee_id:myId(),
      job_id:jobId,
      check_in:iso,
      clock_in:iso,
      lat,lng,
      present:true
    });
    if(r.error){
      if(String(r.error.message).includes("duplicate")||String(r.error.message).includes("unique"))return msg("Du bist bereits irgendwo eingecheckt.");
      return msg(r.error.message);
    }
    startTracking(jobId);
    await loadAll();
    render();
  },()=>msg("GPS erlauben."),{enableHighAccuracy:true,timeout:12000,maximumAge:0});
};

window.sxgGeocodeAddress = window.sxgGeocodeAddress || async function(address){
  if(!address)return null;
  try{
    const q = address.includes(",") ? address : address + ", Deutschland";
    const r=await fetch("https://nominatim.openstreetmap.org/search?format=json&limit=1&q="+encodeURIComponent(q),{headers:{"Accept":"application/json"}});
    const d=await r.json();
    if(d&&d[0])return {lat:Number(d[0].lat),lng:Number(d[0].lon)};
  }catch(e){}
  return null;
};

window.sxgOpenAttendance = window.sxgOpenAttendance || function(pid,jobId=null){
  return state.attendance.find(a=>(a.profile_id||a.employee_id)===pid&&!a.check_out&&!a.clock_out&&(!jobId||String(a.job_id)===String(jobId)));
};

window.checkIn = async function(jobId){
  await loadAll();
  const j=jobOf(jobId);
  if(!j)return msg("Einsatz nicht gefunden.");

  if(window.sxgOpenAttendance(myId()))return msg("Du bist bereits eingecheckt. Bitte erst auschecken.");
  if(!navigator.geolocation)return msg("GPS nicht verfügbar.");

  // Zeitfenster prüfen
  try{
    const d=jobDate(j)||j.start_date;
    if(d){
      const start=new Date(`${d}T${String(j.start_time||"00:00").slice(0,5)}:00`);
      const end=new Date(`${d}T${String(j.end_time||"23:59").slice(0,5)}:00`);
      if(end<start)end.setDate(end.getDate()+1);
      const now=Date.now();
      if(now>end.getTime())return msg("Der Einsatz ist bereits beendet.");
      if(now>start.getTime()+15*60*1000)return msg("Check-in ist nur bis 15 Minuten nach Beginn möglich. Admin kann dich nachträglich einchecken.");
    }
  }catch(e){}

  let gpsActive = j.require_location_tracking !== false && j.require_location_tracking !== "false";

  // Falls GPS aktiv ist, aber Koordinaten fehlen: Adresse automatisch suchen und im Auftrag speichern
  if(gpsActive && (!j.lat || !j.lng)){
    const address=[j.address,j.location,j.client].filter(Boolean).join(", ");
    const g=await window.sxgGeocodeAddress(address);
    if(g){
      j.lat=g.lat; j.lng=g.lng;
      await sb.from("jobs").update({lat:g.lat,lng:g.lng}).eq("id",j.id);
    }else{
      return msg("Adresse konnte nicht gefunden werden. Bitte beim Auftrag vollständige Adresse eintragen, z.B. Straße Hausnummer, PLZ Ort, oder GPS/Radius im Auftrag deaktivieren.");
    }
  }

  navigator.geolocation.getCurrentPosition(async pos=>{
    const lat=pos.coords.latitude,lng=pos.coords.longitude;

    if(gpsActive){
      const dist=hav(lat,lng,Number(j.lat),Number(j.lng));
      const radius=Number(j.geo_radius_m||1000);
      if(dist>radius)return msg("Du bist zu weit vom Einsatzort entfernt. Entfernung: "+Math.round(dist)+" m / erlaubt: "+radius+" m");
    }

    const iso=new Date().toISOString();
    const r=await sb.from("attendance").insert({
      profile_id:myId(),
      employee_id:myId(),
      job_id:jobId,
      check_in:iso,
      clock_in:iso,
      lat,lng,
      present:true
    });

    if(r.error){
      if(String(r.error.message).includes("duplicate")||String(r.error.message).includes("unique"))return msg("Du bist bereits eingecheckt.");
      return msg(r.error.message);
    }

    startTracking(jobId);
    await loadAll();
    render();
  },()=>msg("GPS am Handy/Browser erlauben, sonst kein Check-in möglich."),{enableHighAccuracy:true,timeout:12000,maximumAge:0});
};

    const padding="=".repeat((4-base64String.length%4)%4);
    const base64=(base64String+padding).replace(/-/g,"+").replace(/_/g,"/");
    const rawData=atob(base64);
    return Uint8Array.from([...rawData].map(c=>c.charCodeAt(0)));

  async function sxgNotifyProfiles(title, body, profileIds=[]){

      });

    if(!("serviceWorker" in navigator))return msg("Push wird von diesem Browser nicht unterstützt.");
    if(!("PushManager" in window))return msg("Push wird auf diesem Gerät/Browser nicht unterstützt. Auf iPhone muss die App über Safari zum Home-Bildschirm hinzugefügt sein.");
    if(Notification.permission==="denied")return msg("Benachrichtigungen sind blockiert. Bitte in den Browser-/Handy-Einstellungen erlauben.");

    const permission=await Notification.requestPermission();
    if(permission!=="granted")return msg("Benachrichtigung wurde nicht erlaubt.");

    const reg=await navigator.serviceWorker.register("/sw.js?v=12");
    await navigator.serviceWorker.ready;

    const publicKey=(window.VAPID_PUBLIC_KEY || "BIhKZ71zFU8ix8qDiJ6uTwy7CPCIfuN_1UdmNgEp5kNntGdJ907YUc_1oNtrY2bOPfXKVAMV0b-2B5EHTGL1Dfk").trim();
    let sub=await reg.pushManager.getSubscription();
    if(!sub){
      sub=await reg.pushManager.subscribe({
        userVisibleOnly:true,
        applicationServerKey:urlBase64ToUint8Array(publicKey)
      });
    }

    const data=sub.toJSON();

    },()=>msg("GPS am Handy/Browser erlauben."),{enableHighAccuracy:true,timeout:12000,maximumAge:0});
  };

  async function sendShiftReminders(){
    if(!myId())return;
    const now=Date.now();
    const myAss=state.assignments.filter(a=>pidOf(a)===myId());
    for(const a of myAss){
      const j=jobOf(a.job_id);
      if(!j)continue;
      const st=jobStart(j);
      if(!st)continue;
      const diff=st.getTime()-now;
      const key1=`sxg-reminder-24h-${myId()}-${j.id}`;
      const key2=`sxg-reminder-2h-${myId()}-${j.id}`;
      if(diff>23.5*3600000 && diff<24.5*3600000 && !localStorage.getItem(key1)){
        localStorage.setItem(key1,"1");
        await sxgNotifyProfiles("Erinnerung: Einsatz morgen",`${j.title} · ${jobDate(j)} ${j.start_time}`,[myId()]);
      }
      if(diff>1.8*3600000 && diff<2.2*3600000 && !localStorage.getItem(key2)){
        localStorage.setItem(key2,"1");
        await sxgNotifyProfiles("Erinnerung: Einsatz in 2 Stunden",`${j.title} · ${jobDate(j)} ${j.start_time}`,[myId()]);
      }
    }
  }

    await sendShiftReminders();
    render();
  };

  const oldRender = render;
  render = window.render = function(){

  };

  if(!window.sxgReminderTimer){
    window.sxgReminderTimer=setInterval(async()=>{try{await loadAll();await sendShiftReminders()}catch(e){}},10*60*1000);
  }
})();

    const empFilter=admin()?`<section class="panel"><div class="toolbar"><h3>Mitarbeiter filtern</h3><select onchange="state.adminEmployeeFilter=this.value;render()"><option value="">Alle Mitarbeiter</option>${state.profiles.map(p=>`<option value="${p.id}" ${fp===p.id?"selected":""}>${esc(p.full_name||p.email)}</option>`).join("")}</select></div></section>`:"";
    return `${empFilter}${dateFilter}<section class="panel"><div class="toolbar"><h2>${admin()?'Aufträge verwalten':'Offene Einsätze'}</h2>${admin()?`<button onclick="openModal('job')">+ Auftrag</button> <button onclick="openModal('repeat')">Wiederholen</button>`:""}</div><div class="table">${list.map(j=>{const c=assignedCount(j.id),max=Number(j.needed_employees||1),full=c>=max,mine=isAssigned(j.id),open=(window.sxgOpenAttendance?window.sxgOpenAttendance(myId(),j.id):null);return `<div class="row"><div><b>${esc(j.title)}</b><br>${esc(j.client||"")} · ${esc(j.location||"")}<br>${esc(j.address||"")}<br>${esc(jobDate(j)||j.job_date||"")} ${esc(j.start_time||"")}-${esc(j.end_time||"")}<br>${admin()?`<b>Eingetragen:</b> ${state.assignments.filter(a=>String(a.job_id)===String(j.id)).map(a=>`${esc(nameOf(pidOf(a)))} <button class='danger' onclick="unassignJob(${j.id},'${pidOf(a)}')">x</button>`).join(" ")||"niemand"}`:""}${window.jobImagesHtml?jobImagesHtml(j.id):""}${jobExcelHtml(j.id)}</div><span>${c}/${max}</span><span class="badge ${full?'warn':'ok'}">${full?'voll':'frei'}</span><div>${admin()?`<button class="secondary" onclick="openModal('assign',${j.id})">Eintragen</button> <button class="secondary" onclick="openModal('job',${j.id})">Bearbeiten</button> <button class="secondary" onclick="openModal('jobVisibility',${j.id})">Sichtbarkeit</button> <button class="secondary" onclick="openModal('jobMessage',${j.id})">Senden</button> <button class="danger" onclick="delJob(${j.id})">Löschen</button>`:open?`<button class="ok" onclick="checkOut()">Check-out</button>`:mine?`<button class="ok" onclick="checkIn(${j.id})">Check-in</button> <button class="secondary" onclick="unassignJob(${j.id})">Austragen</button>`:`<button onclick="assignJob(${j.id})" ${full?'disabled':''}>Eintragen</button>`}</div></div>`}).join("")||`<div class="empty">Keine Einsätze</div>`}</div></section>`;
  };

  modalHtml=window.modalHtml=function(){
    if(!state.modal)return "";
    const {type,id}=state.modal;

})();


/* SXG v14.1 Excel API Fehleranzeige Fix */
(function(){
  window.generateJobExcel = async function(jobId,fileId){
    await loadAll();
    const job=jobOf(jobId);
    const file=state.job_excel_files.find(f=>String(f.id)===String(fileId))||state.job_excel_files.find(f=>String(f.job_id)===String(jobId));
    if(!file)return msg("Bitte zuerst Kunden-Excel hochladen.");
    if(file.template_name && !String(file.template_name).toLowerCase().endsWith(".xlsx")){
      return msg("Bitte als .xlsx hochladen. Alte .xls-Dateien werden nicht unterstützt.");
    }
    const employees=state.assignments
      .filter(a=>String(a.job_id)===String(jobId))
      .map(a=>state.profiles.find(p=>p.id===(a.profile_id||a.employee_id)))
      .filter(Boolean)
      .map(p=>({full_name:p.full_name||p.email||"",email:p.email||"",phone:p.phone||"",guard_id:p.guard_id||"",epin:p.epin||p.e_pin||"",tax_id:p.tax_id||"",qualification:p.qualification||""}));
    if(!employees.length)return msg("Keine Mitarbeiter im Auftrag eingetragen.");

    const res=await fetch("/api/fill-excel",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({jobId,fileId:file.id,templatePath:file.template_path,templateName:file.template_name,employees,job:{title:job?.title,client:job?.client,location:job?.location,address:job?.address,job_date:jobDate(job),start_time:job?.start_time,end_time:job?.end_time}})});

    let data={}, raw="";
    try{raw=await res.text();data=JSON.parse(raw)}catch(e){data={error:raw||"Keine API-Antwort"}}
    if(!res.ok)return msg("Excel konnte nicht erstellt werden: "+(data.error||("HTTP "+res.status)));

    await sb.from("job_excel_files").update({generated_path:data.generatedPath,generated_name:data.generatedName,status:"generated",generated_at:new Date().toISOString()}).eq("id",file.id);
    await loadAll();render();msg("Excel wurde erstellt.");
  };
})();


/* SXG v15 Stable Rebuild */
(function(){
  function sxgPid(x){ return x && (x.profile_id || x.employee_id || x.user_id) || ""; }
  function sxgSplitName(full){
    var parts = String(full || "").trim().split(/\s+/).filter(Boolean);
    return { first_name: parts[0] || "", last_name: parts.slice(1).join(" ") || "" };
  }
  function sxgCleanName(p){
    var sp = sxgSplitName(p && p.full_name);
    var first = (p && p.first_name) || sp.first_name || "";
    var last = (p && p.last_name) || sp.last_name || "";
    return {
      first_name:first,
      last_name:last,
      full_name: [first,last].filter(Boolean).join(" ") || (p && p.full_name) || (p && p.email) || ""
    };
  }
  function sxgName(id){
    var p = (state.profiles || []).find(function(x){ return x.id === id; });
    var n = sxgCleanName(p);
    return n.full_name || id || "Mitarbeiter";
  }

  window.sxgPid = sxgPid;
  window.sxgName = sxgName;

  async function sxgLoadExtras(){
    async function safe2(p){
      try{ var r = await p; return r.data || []; }catch(e){ return []; }
    }
    state.job_images = await safe2(sb.from("job_images").select("*").order("created_at",{ascending:false}));
    state.job_excel_files = await safe2(sb.from("job_excel_files").select("*").order("created_at",{ascending:false}));
    state.job_visibility = await safe2(sb.from("job_visible_profiles").select("*"));
  }
  window.sxgLoadExtras = sxgLoadExtras;

  window.sxgOpenJobImage = async function(path){
    var r = await sb.storage.from("job-images").createSignedUrl(path,3600);
    if(r.error) return msg(r.error.message);
    window.open(r.data.signedUrl,"_blank");
  };
  window.sxgUploadJobImage = function(jobId){
    var inp = document.createElement("input");
    inp.type = "file";
    inp.accept = "image/*";
    inp.multiple = true;
    inp.onchange = async function(){
      for(var i=0;i<inp.files.length;i++){
        var file = inp.files[i];
        var path = "job-" + jobId + "/" + Date.now() + "-" + file.name.replace(/[^a-zA-Z0-9._-]/g,"_");
        var up = await sb.storage.from("job-images").upload(path,file,{upsert:false});
        if(up.error){ msg(up.error.message); continue; }
        var r = await sb.from("job_images").insert({job_id:jobId,profile_id:myId(),file_path:path,file_name:file.name});
        if(r.error) msg(r.error.message);
      }
      await sxgLoadExtras();
      render();
    };
    inp.click();
  };
  window.sxgDelJobImage = async function(id,path){
    if(!confirm("Bild löschen?")) return;
    await sb.storage.from("job-images").remove([path]);
    var r = await sb.from("job_images").delete().eq("id",id);
    if(r.error) return msg(r.error.message);
    await sxgLoadExtras(); render();
  };

  window.sxgOpenJobExcel = async function(path){
    var r = await sb.storage.from("job-excel").createSignedUrl(path,3600);
    if(r.error) return msg(r.error.message);
    window.open(r.data.signedUrl,"_blank");
  };
  window.sxgUploadJobExcel = function(jobId){
    var inp = document.createElement("input");
    inp.type = "file";
    inp.accept = ".xlsx";
    inp.onchange = async function(){
      var file = inp.files[0];
      if(!file) return;
      if(!file.name.toLowerCase().endsWith(".xlsx")) return msg("Bitte .xlsx hochladen.");
      var path = "job-" + jobId + "/template-" + Date.now() + "-" + file.name.replace(/[^a-zA-Z0-9._-]/g,"_");
      var up = await sb.storage.from("job-excel").upload(path,file,{upsert:false});
      if(up.error) return msg(up.error.message);
      var r = await sb.from("job_excel_files").insert({job_id:jobId,uploaded_by:myId(),template_path:path,template_name:file.name,status:"template"});
      if(r.error) return msg(r.error.message);
      await sxgLoadExtras(); render();
    };
    inp.click();
  };
  window.sxgGenerateJobExcel = async function(jobId,fileId){
    await loadAll();
    await sxgLoadExtras();
    var job = jobOf(jobId);
    var files = state.job_excel_files || [];
    var file = files.find(function(f){ return String(f.id) === String(fileId); }) || files.find(function(f){ return String(f.job_id) === String(jobId); });
    if(!file) return msg("Bitte zuerst Kunden-Excel hochladen.");
    var employees = (state.assignments||[])
      .filter(function(a){ return String(a.job_id) === String(jobId); })
      .map(function(a){ return (state.profiles||[]).find(function(p){ return p.id === sxgPid(a); }); })
      .filter(Boolean)
      .map(function(p){
        var n = sxgCleanName(p);
        return {
          first_name:n.first_name,
          last_name:n.last_name,
          full_name:n.full_name,
          email:p.email||"",
          phone:p.phone||"",
          guard_id:p.guard_id||"",
          epin:p.epin||p.e_pin||"",
          tax_id:p.tax_id||"",
          qualification:p.qualification||""
        };
      });
    if(!employees.length) return msg("Keine Mitarbeiter im Auftrag eingetragen.");
    var res = await fetch("/api/fill-excel",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        jobId:jobId,
        fileId:file.id,
        templatePath:file.template_path,
        templateName:file.template_name,
        employees:employees,
        job:{title:job && job.title,client:job && job.client,location:job && job.location,address:job && job.address,job_date:jobDate(job),start_time:job && job.start_time,end_time:job && job.end_time}
      })
    });
    var raw = "", data = {};
    try{ raw = await res.text(); data = JSON.parse(raw); }catch(e){ data = {error:raw || "Keine API-Antwort"}; }
    if(!res.ok) return msg("Excel konnte nicht erstellt werden: " + (data.error || ("HTTP " + res.status)));
    await sb.from("job_excel_files").update({generated_path:data.generatedPath,generated_name:data.generatedName,status:"generated",generated_at:new Date().toISOString()}).eq("id",file.id);
    await sxgLoadExtras(); render(); msg("Excel wurde erstellt.");
  };
  window.sxgDelJobExcel = async function(id){
    var f = (state.job_excel_files||[]).find(function(x){ return String(x.id) === String(id); });
    if(!f || !confirm("Excel-Datei löschen?")) return;
    var paths = [f.template_path,f.generated_path].filter(Boolean);
    if(paths.length) await sb.storage.from("job-excel").remove(paths);
    var r = await sb.from("job_excel_files").delete().eq("id",id);
    if(r.error) return msg(r.error.message);
    await sxgLoadExtras(); render();
  };

  function sxgJobMediaHtml(jobId){
    var imgs = (state.job_images||[]).filter(function(i){ return String(i.job_id) === String(jobId); });
    var excels = (state.job_excel_files||[]).filter(function(f){ return String(f.job_id) === String(jobId); });
    var imgHtml = imgs.map(function(i){
      var path = String(i.file_path).replace(/'/g,"\\'");
      return "<button class='secondary' onclick=\"sxgOpenJobImage('"+path+"')\">📷 "+esc(i.file_name||"Bild")+"</button>" + (admin() ? " <button class='danger' onclick=\"sxgDelJobImage("+i.id+",'"+path+"')\">x</button>" : "");
    }).join(" ") || "<small>Keine Bilder</small>";
    var excelHtml = "";
    if(admin()){
      excelHtml = "<br><br><b>Kunden-Excel:</b><br>" + (excels.map(function(f){
        var t = String(f.template_path).replace(/'/g,"\\'");
        var g = String(f.generated_path||"").replace(/'/g,"\\'");
        return "<div style='margin:6px 0'><button class='secondary' onclick=\"sxgOpenJobExcel('"+t+"')\">Vorlage: "+esc(f.template_name||"Excel")+"</button> <button onclick='sxgGenerateJobExcel("+jobId+","+f.id+")'>Generieren</button> " + (f.generated_path ? "<button class='ok' onclick=\"sxgOpenJobExcel('"+g+"')\">Fertige Excel herunterladen</button>" : "") + " <button class='danger' onclick='sxgDelJobExcel("+f.id+")'>Löschen</button></div>";
      }).join("") || "<small>Keine Excel hinterlegt</small>") + " <button onclick='sxgUploadJobExcel("+jobId+")'>+ Kunden-Excel hochladen</button>";
    }
    return "<div class='sxg-media' style='margin-top:10px;border-top:1px solid #eee;padding-top:8px'><b>Bilder:</b><br>" + imgHtml + " <button onclick='sxgUploadJobImage("+jobId+")'>+ Bild</button>" + excelHtml + "</div>";
  }
  window.sxgJobMediaHtml = sxgJobMediaHtml;

  window.sxgEnhanceJobs = async function(){
    await sxgLoadExtras();
    document.querySelectorAll(".row").forEach(function(row){
      if(row.querySelector(".sxg-media")) return;
      var buttons = Array.prototype.slice.call(row.querySelectorAll("button"));
      var jobId = null;
      buttons.some(function(b){
        var s = b.getAttribute("onclick") || "";
        var m = s.match(/openModal\('job',(\d+)\)/) || s.match(/assignJob\((\d+)\)/) || s.match(/checkIn\((\d+)\)/) || s.match(/openModal\('assign',(\d+)\)/);
        if(m){ jobId = m[1]; return true; }
        return false;
      });
      if(!jobId) return;
      var firstDiv = row.querySelector("div");
      if(firstDiv) firstDiv.insertAdjacentHTML("beforeend", sxgJobMediaHtml(jobId));
    });
  };

  window.sxgOpenChatImage = async function(path){
    var r = await sb.storage.from("chat-images").createSignedUrl(path,3600);
    if(r.error) return msg(r.error.message);
    window.open(r.data.signedUrl,"_blank");
  };
  window.sxgSendChatImage = function(toPid){
    var inp = document.createElement("input");
    inp.type = "file";
    inp.accept = "image/*";
    inp.onchange = async function(){
      var file = inp.files[0];
      if(!file) return;
      var path = "chat/" + myId() + "-" + toPid + "/" + Date.now() + "-" + file.name.replace(/[^a-zA-Z0-9._-]/g,"_");
      var up = await sb.storage.from("chat-images").upload(path,file,{upsert:false});
      if(up.error) return msg(up.error.message);
      var r = await sb.from("chat_messages").insert({from_profile_id:myId(),to_profile_id:toPid,body:"[Bild]",image_path:path,image_name:file.name});
      if(r.error) return msg(r.error.message);
      await loadAll(); render();
    };
    inp.click();
  };

  window.sxgEnhanceChat = function(){
    var panelHeaders = Array.prototype.slice.call(document.querySelectorAll("section.panel h2"));
    var chatHeader = panelHeaders.find(function(h){ return h.textContent.trim() === "Chat"; });
    if(!chatHeader) return;
    var panel = chatHeader.closest("section.panel");
    if(!panel || panel.querySelector(".sxg-chat-image-box")) return;
    var people = (state.profiles||[]).filter(function(p){ return p.id !== myId(); });
    var html = "<div class='toolbar sxg-chat-image-box'><select id='sxgChatImageTo'>" + people.map(function(p){ return "<option value='"+p.id+"'>"+esc(sxgName(p.id))+"</option>"; }).join("") + "</select><button onclick=\"sxgSendChatImage(document.getElementById('sxgChatImageTo').value)\">+ Bild senden</button></div>";
    chatHeader.insertAdjacentHTML("afterend", html);
    panel.querySelectorAll(".row").forEach(function(row){
      if(row.innerHTML.indexOf("[Bild]")>=0){
        var msg = (state.chats||[]).find(function(c){ return c.image_path && row.textContent.indexOf(sxgName(c.from_profile_id))>=0; });
        if(msg){
          row.querySelector("div").innerHTML += "<br><button class='secondary' onclick=\"sxgOpenChatImage('"+String(msg.image_path).replace(/'/g,"\\'")+"')\">📷 "+esc(msg.image_name||"Bild öffnen")+"</button>";
        }
      }
    });
  };

  window.sxgPatchProfileModal = function(){
    var form = document.getElementById("profileForm");
    if(!form || form.querySelector("[name='first_name']")) return;
    var idInput = form.querySelector("[name='id']");
    var id = idInput && idInput.value;
    var p = (state.profiles||[]).find(function(x){ return x.id === id; }) || state.profile || {};
    var n = sxgCleanName(p);
    var full = form.querySelector("[name='full_name']");
    if(full){
      full.insertAdjacentHTML("beforebegin","<input name='first_name' placeholder='Vorname' value='"+esc(n.first_name)+"' "+(admin()?"":"readonly")+"><input name='last_name' placeholder='Nachname' value='"+esc(n.last_name)+"' "+(admin()?"":"readonly")+">");
      full.type = "hidden";
      full.value = n.full_name;
    }
    if(!form.querySelector("[name='epin']")){
      var guard = form.querySelector("[name='guard_id']");
      if(guard) guard.insertAdjacentHTML("afterend","<input name='epin' placeholder='E-PIN' value='"+esc(p.epin||p.e_pin||"")+"' "+(admin()?"":"readonly")+">");
    }
  };

  var oldOpenModal = window.openModal;
  window.openModal = function(type,id){
    oldOpenModal(type,id);
    setTimeout(function(){ if(type==="profile") sxgPatchProfileModal(); },80);
  };

  var oldRender = window.render;
  window.render = function(){
    var out = oldRender();
    setTimeout(function(){ sxgEnhanceJobs(); sxgEnhanceChat(); },300);
    return out;
  };

  setTimeout(function(){ sxgEnhanceJobs(); sxgEnhanceChat(); },1200);
})();

init();
}catch(e){document.getElementById("root").innerHTML='<div class="error"><b>Startfehler:</b>\\n'+String(e.message)+'</div>'}
</script>
